<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>OLYMPUS | GRAND MULTIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --active-glow: var(--neon-cyan);
            --transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; color: #fff; }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        .ui-master { position: fixed; inset: 0; opacity: 1; transition: var(--transition); pointer-events: all; z-index: 2; display: flex; flex-direction: column; }
        .ui-hidden { opacity: 0; pointer-events: none; transform: scale(1.05); filter: blur(10px); }

        .nav-header { padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 3000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .menu-btn { 
            width: 50px; height: 50px; flex-shrink: 0; background: rgba(0,0,0,0.8); 
            border: 1.5px solid var(--active-glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--active-glow); cursor: pointer; transition: var(--transition);
            box-shadow: 0 0 15px var(--active-glow); 
        }

        .search-container { flex-grow: 1; max-width: 600px; margin: 0 auto; }
        #mallSearch { 
            width: 100%; background: rgba(0,0,0,0.8); border: 1.5px solid var(--active-glow); 
            padding: 12px 25px; border-radius: 30px; color: #fff; outline: none; 
            transition: var(--transition); box-shadow: 0 0 10px var(--active-glow);
        }

        .sidebar { 
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; 
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(30px); 
            border-right: 1px solid var(--active-glow); z-index: 4000; 
            transition: var(--transition); padding: 100px 0 50px 0; overflow-y: auto; 
        }
        .sidebar.active { left: 0; }
        .menu-link { 
            padding: 16px 30px; display: block; color: #aaa; text-decoration: none; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; 
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .menu-link:hover, .menu-link.active-link { color: var(--active-glow); background: rgba(255,255,255,0.05); border-left: 3px solid var(--active-glow); }

        .viewport { flex-grow: 1; overflow-y: auto; padding: 20px 20px 100px; display: flex; flex-direction: column; align-items: center; scrollbar-width: none; }
        .cat-banner { 
            color: var(--active-glow); letter-spacing: 12px; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 50px; text-shadow: 0 0 20px var(--active-glow); 
            text-align: center; font-size: 1.5rem; pointer-events: none; transition: var(--transition);
        }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; width: 100%; max-width: 1500px; pointer-events: none; }

        .hologram-card { 
            background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            text-decoration: none; overflow: hidden; transition: 0.4s; 
            display: flex; flex-direction: column; pointer-events: auto; 
        }
        .hologram-card:hover { transform: translateY(-8px); border-color: var(--active-glow); box-shadow: 0 0 30px var(--active-glow); }
        
        .visual-container { width: 100%; height: 120px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .card-icon { font-size: 3rem; color: var(--active-glow); text-shadow: 0 0 15px var(--active-glow); transition: var(--transition); }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; filter: contrast(1.1) brightness(0.9); }

        .label { padding: 15px; color: #fff; font-size: 0.65rem; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }
    </style>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // GALAXY ENGINE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

        // STARS
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<15000; i++) { starPos.push(THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000)); }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0x00ffff, size: 0.8, transparent: true});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // CENTRAL CORE (THE SUN)
        const sunGeo = new THREE.SphereGeometry(60, 64, 64);
        const sunMat = new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2});
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);
        
        const light = new THREE.PointLight(0x00ffff, 5, 3000);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.z = 1000;

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();

        // COLOR ENGINE
        window.updateGalaxyColor = (hexColor) => {
            const color = new THREE.Color(hexColor);
            sun.material.color.set(color);
            sun.material.emissive.set(color);
            stars.material.color.set(color);
            light.color.set(color);
            document.documentElement.style.setProperty('--active-glow', hexColor);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

        let categories = [];
        let linkData = {};

        async function bootMultiverse() {
            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error('data.json not found');
                const data = await res.json();
                categories = data.categories;
                linkData = data.links;
            } catch (e) {
                console.warn('Using fallback inline data:', e);
                categories = fallbackData.categories;
                linkData = fallbackData.links;
            }

            const sidebar = document.getElementById('sidebar');
            categories.forEach(cat => {
                sidebar.innerHTML += `<a class="menu-link" id="link-${cat.id}" onclick="showSection('${cat.id}')">${cat.name}</a>`;
            });
            showSection('core');
        }

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const ind = document.getElementById('cat-indicator');
            const color = colorPalette[id] || '#00ffff';

            if(window.updateGalaxyColor) window.updateGalaxyColor(color);

            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(`link-${id}`)?.classList.add('active-link');
            
            ind.innerText = categories.find(c => c.id === id)?.name || id;
            grid.innerHTML = '';
            
            (linkData[id] || []).forEach(item => {
                let visual = `<i class="${item.i || 'fa-solid fa-link'} card-icon"></i>`;
                if(item.img) visual = `<img src="${item.img}" class="card-img" alt="${item.n}">`;
                
                grid.innerHTML += `
                    <a href="${item.u}" target="_blank" class="hologram-card">
                        <div class="visual-container">${visual}</div>
                        <div class="label">${item.n}</div>
                    </a>`;
            });

            if(window.innerWidth < 800) toggleSidebar(false);
        }

        function searchMall() {
            const q = document.getElementById('mallSearch').value.toLowerCase().trim();
            if(!q) { showSection('core'); return; }

            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';

            Object.values(linkData).flat().forEach(item => {
                if(item.n.toLowerCase().includes(q)) {
                    let v = item.img ? `<img src="${item.img}" class="card-img" alt="${item.n}">` : `<i class="${item.i || 'fa-solid fa-link'} card-icon"></i>`;
                    grid.innerHTML += `<a href="${item.u}" target="_blank" class="hologram-card"><div class="visual-container">${v}</div><div class="label">${item.n}</div></a>`;
                }
            });
        }

        function toggleSidebar(force) { 
            const sb = document.getElementById('sidebar');
            if(typeof force === 'boolean') {
                sb.classList.toggle('active', force);
            } else {
                sb.classList.toggle('active');
            }
        }

        window.onload = bootMultiverse;
    </script>
