    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --glow: 0 0 40px rgba(0,255,255,0.6);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI', system-ui, sans-serif; }

        canvas { display:block; touch-action:none; }

        /* FLOATING HOLOGRAPHIC OLYMPUS FRAME (centered where Sun was) */
        #olympus-holo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 94%;
            max-width: 520px;
            height: 88vh;
            background: rgba(0,10,20,0.82);
            backdrop-filter: blur(32px);
            border: 2px solid rgba(0,255,255,0.55);
            border-radius: 32px;
            box-shadow: 0 0 120px rgba(0,255,255,0.45),
                        inset 0 0 80px rgba(0,255,255,0.25);
            z-index: 999;
            overflow: hidden;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23,1,0.32,1);
        }
        #olympus-holo.active { opacity:1; }

        /* FREE-FLOATING MENU BUTTON */
        .menu-btn {
            position: fixed;
            top: 28px; left: 28px;
            z-index: 3000;
            background: rgba(0,255,255,0.18);
            border: 2px solid #00ffff;
            color: #00ffff;
            width: 58px; height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: var(--glow);
            animation: menuFloat 4s ease-in-out infinite;
            pointer-events: auto;
        }
        @keyframes menuFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1deg); }
        }

        /* SEARCH BAR */
        .top-search {
            position: absolute;
            top: 22px; left: 50%;
            transform: translateX(-50%);
            width: 86%;
            max-width: 380px;
            z-index: 2500;
        }
        #mallSearch {
            width: 100%;
            background: rgba(0,255,255,0.08);
            border: 1px solid rgba(0,255,255,0.5);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        /* VERTICAL FREE-FLOATING CARDS (Olympian Estate) */
        .estate-container {
            padding: 120px 20px 140px;
            overflow-y: auto;
            height: 100%;
            scrollbar-width: none;
        }
        .estate-card {
            background: transparent;
            border: 2px solid rgba(0,255,255,0.4);
            border-radius: 18px;
            margin-bottom: 28px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 35px rgba(0,255,255,0.25);
            animation: cardFloat 5.5s ease-in-out infinite;
            transition: all 0.4s ease;
        }
        .estate-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 60px rgba(0,255,255,0.6);
            transform: scale(1.03);
        }
        .estate-card video {
            width: 100%;
            height: 210px;
            object-fit: cover;
            filter: brightness(1.15) contrast(1.1);
        }
        .estate-card .title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,10,20,0.95));
            padding: 18px 20px 22px;
            color: #00ffff;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-align: center;
            text-shadow: 0 0 15px #00ffff;
            pointer-events: none;
        }

        /* Different float delays for gravity-field effect */
        .estate-card:nth-child(1) { animation-delay: 0s; }
        .estate-card:nth-child(2) { animation-delay: 0.8s; }
        .estate-card:nth-child(3) { animation-delay: 1.7s; }
        .estate-card:nth-child(4) { animation-delay: 2.4s; }
        .estate-card:nth-child(5) { animation-delay: 3.1s; }

        @keyframes cardFloat {
            0%,100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-14px) rotate(0.6deg); }
        }

        /* FLOATING SHARE BUTTON */
        #floating-share {
            position: fixed;
            bottom: 32px; right: 32px;
            z-index: 4000;
            width: 64px; height: 64px;
            background: rgba(0,255,255,0.22);
            border: 3px solid #00ffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            color: #00ffff;
            box-shadow: var(--glow);
            animation: sharePulse 3s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes sharePulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* EXPANDED SHARE PANEL */
        #share-panel {
            position: fixed;
            bottom: 120px; right: 20px;
            width: 340px;
            background: rgba(0,10,20,0.96);

            border-radius: 20px;

            display: none;
            z-index: 4100;
            max-height: 68vh;
            overflow-y: auto;
        }
        #share-panel.active { display: block; }
        .share-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48px,1fr));
            gap: 18px;
            justify-items: center;
        }
        .share-icon {
            width: 52px; height: 52px;
            background: rgba(0,255,255,0.1);
            border: 2px solid #00ffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.65rem;
            color: #00ffff;
            transition: all 0.3s;
        }
        .share-icon:hover {

            color: #000;
            transform: scale(1.2);
        }

        /* Sidebar & other elements (kept minimal) */

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;

        // Stars + planets (Sun removed)
        const starGeo = new THREE.BufferGeometry();
        const starVertices = [];
        for(let i=0;i<14000;i++) starVertices.push(THREE.MathUtils.randFloatSpread(5000),THREE.MathUtils.randFloatSpread(5000),THREE.MathUtils.randFloatSpread(5000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
        const starMat = new THREE.PointsMaterial({size:1.6,color:0x88ffff,transparent:true,opacity:0.75});
        const stars = new THREE.Points(starGeo,starMat);
        scene.add(stars);

        // Planets (no Sun)
        const planets = [];
        const createPlanet = (r,d,c) => {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(r,48,48), new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.2}));
            scene.add(mesh);
            planets.push(mesh);
            return mesh;
        };
        createPlanet(2.2,60,0xaaaaaa); // Mercury
        createPlanet(3.8,90,0xffcc66); // Venus
        createPlanet(4.0,130,0x3388ff); // Earth
        createPlanet(3.0,180,0xff5533); // Mars
        createPlanet(10,300,0xffbb77); // Jupiter
        createPlanet(8.5,450,0xffeebb); // Saturn
        createPlanet(6,650,0xaaffff); // Uranus
        createPlanet(6,800,0x3366dd); // Neptune

        camera.position.set(0,180,650);
        controls.update();

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.00012;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
    </script>
