<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLYMPUS | ONLINE SHOPPING MALL</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --grid-border: rgba(188, 19, 254, 0.25);
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-hover: rgba(188, 19, 254, 0.15);
            --text-main: #e0e0e0;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--black-bloom);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Custom Scrollbar for the Cyberpunk feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--black-bloom);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--grid-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-purple);
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            border-right: 1px solid var(--grid-border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .brand-header {
            padding: 0 25px 30px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            border-bottom: 1px solid var(--grid-border);
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        .menu-link {
            padding: 15px 25px;
            text-decoration: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-link:hover, .menu-link.active {
            color: var(--neon-cyan);
            background: linear-gradient(90deg, var(--glass-hover) 0%, transparent 100%);
            padding-left: 35px;
            border-left: 4px solid var(--neon-cyan);
        }

        /* --- MAIN VIEWPORT --- */
        .viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- TOP SEARCH NAV --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(5, 5, 5, 0.9);
            border-bottom: 1px solid var(--grid-border);
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        .search-container {
            position: relative;
            width: 450px;
        }

        #mallSearch {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--grid-border);
            padding: 14px 20px;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        #mallSearch:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: rgba(0, 242, 255, 0.05);
        }

        #mallSearch::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .system-status {
            color: var(--neon-purple);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(188, 19, 254, 0.5);
        }

        /* --- CONTENT AREA & GRID --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            position: relative;
            min-height: 200px;
        }

        .grid-item {
            background: var(--glass-bg);
            border: 1px solid var(--grid-border);
            padding: 30px 15px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .grid-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        .grid-item:hover::before {
            left: 200%;
        }

        .grid-item:hover {
            background: var(--glass-hover);
            border-color: var(--neon-purple);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(188, 19, 254, 0.3) inset;
            color: white;
        }

        .icon-box {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
            transition: 0.3s;
        }

        .grid-item:hover .icon-box {
            transform: scale(1.1);
        }

        .item-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Global Sweep Animation */
        @keyframes sweep {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(300%) skewX(-25deg); }
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 242, 255, 0.03), transparent);
            pointer-events: none;
            animation: sweep 2.5s infinite linear;
            z-index: 0;
        }

        /* Background Grid Lines */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-header">OLYMPUS MALL</div>
        <a class="menu-link active" onclick="renderCategory('ai_saas', this)">AI & SaaS <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('web3indie', this)">Web3 Indie <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('housingRentals', this)">Housing Rentals <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('vehicleRentals', this)">Vehicle Rentals <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('vehiclePurchase', this)">Vehicle Sales <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('web3jobs', this)">Web3 Jobs <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('globaljobs', this)">Global Jobs <span>〉</span></a>
        <a class="menu-link" onclick="renderCategory('privacy', this)">Privacy Shield <span>〉</span></a>
    </nav>

    <div class="viewport">
        <div class="bg-grid"></div>
        
        <header class="top-nav">
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="Initialize global search override..." onkeyup="searchMall()">
            </div>
            <div class="system-status" id="clock">SYSTEM ONLINE: CALIBRATING...</div>
        </header>

        <main class="main-content">
            <div id="sectionHeading" class="section-title">Department: AI & SAAS</div>
            <div class="icon-grid" id="mallGrid">
                <div class="scan-line"></div>
                </div>
        </main>
    </div>

    <script>
        // --- MASTER DATA OBJECT ---
        const mallData = {
            ai_saas: [
                {n: "Midjourney", u: "https://www.midjourney.com", i: "🎨"},
                {n: "Claude", u: "https://claude.ai", i: "🧠"},
                {n: "Perplexity", u: "https://www.perplexity.ai", i: "🔍"},
                {n: "Grok", u: "https://grok.x.ai", i: "🤖"},
                {n: "Cursor", u: "https://cursor.sh", i: "💻"},
                {n: "RunwayML", u: "https://runwayml.com", i: "🎬"},
                {n: "Notion AI", u: "https://www.notion.so/product/ai", i: "📝"}
            ],
            web3indie: [
                {n: "Lenster", u: "https://lenster.xyz", i: "🌿"},
                {n: "Mirror", u: "https://mirror.xyz", i: "🪞"},
                {n: "Phantom", u: "https://phantom.app", i: "👻"},
                {n: "MetaMask", u: "https://metamask.io", i: "🦊"},
                {n: "Gitcoin", u: "https://gitcoin.co", i: "🪙"},
                {n: "Sanctum", u: "https://sanctum.so", i: "🛡️"},
                {n: "Parcl", u: "https://parcl.co", i: "🏙️"}
            ],
            housingRentals: [
                {n: "Zillow", u: "https://www.zillow.com/rentals", i: "🏠"},
                {n: "Apartments.com", u: "https://www.apartments.com", i: "🏢"},
                {n: "Zumper", u: "https://www.zumper.com", i: "📍"},
                {n: "Airbnb", u: "https://www.airbnb.com", i: "✈️"},
                {n: "Vrbo", u: "https://www.vrbo.com", i: "🏖️"},
                {n: "Furnished Finder", u: "https://www.furnishedfinder.com", i: "🛋️"}
            ],
            vehicleRentals: [
                {n: "DiscoverCars", u: "https://www.discovercars.com", i: "🚗"},
                {n: "Turo", u: "https://turo.com", i: "🔑"},
                {n: "Sixt", u: "https://www.sixt.com", i: "🏎️"},
                {n: "Zipcar", u: "https://www.zipcar.com", i: "⏱️"},
                {n: "AutoSlash", u: "https://www.autoslash.com", i: "📉"},
                {n: "Rentalcars", u: "https://www.rentalcars.com", i: "🌐"}
            ],
            vehiclePurchase: [
                {n: "Cars.com", u: "https://www.cars.com", i: "🚘"},
                {n: "AutoTempest", u: "https://www.autotempest.com", i: "🌪️"},
                {n: "Carvana", u: "https://www.carvana.com", i: "🏗️"},
                {n: "KBB", u: "https://www.kbb.com", i: "📘"},
                {n: "Bring a Trailer", u: "https://bringatrailer.com", i: "🏁"},
                {n: "eBay Motors", u: "https://www.ebay.com/motors", i: "📦"}
            ],
            web3jobs: [
                {n: "Web3 Career", u: "https://web3.career/", i: "🔗"},
                {n: "CryptoJobsList", u: "https://cryptojobslist.com/", i: "📈"},
                {n: "Remote3", u: "https://remote3.co/", i: "🌍"},
                {n: "Calyptus", u: "https://www.calyptus.co/", i: "🎮"}
            ],
            globaljobs: [
                {n: "Indeed", u: "https://www.indeed.com", i: "💼"},
                {n: "LinkedIn", u: "https://www.linkedin.com/jobs/", i: "🤝"},
                {n: "Glassdoor", u: "https://www.glassdoor.com", i: "🏢"},
                {n: "Wellfound", u: "https://wellfound.com", i: "🚀"},
                {n: "FlexJobs", u: "https://www.flexjobs.com", i: "💻"}
            ],
            privacy: [
                {n: "NordVPN", u: "https://nordvpn.com", i: "🛡️"},
                {n: "ProtonVPN", u: "https://protonvpn.com", i: "⚛️"},
                {n: "Mullvad", u: "https://mullvad.net", i: "🔒"},
                {n: "TorGuard", u: "https://torguard.net", i: "🥷"}
            ]
        };

        // --- RENDER LOGIC ---
        let currentCategory = 'ai_saas';

        function renderCategory(cat, element = null) {
            currentCategory = cat;
            const grid = document.getElementById('mallGrid');
            const title = document.getElementById('sectionHeading');
            
            // Handle Active Sidebar State
            if (element) {
                document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
                element.classList.add('active');
            }

            // Format Title dynamically based on key
            const formattedTitle = cat.replace(/([A-Z])/g, ' $1').toUpperCase();
            title.innerText = `DEPARTMENT: ${formattedTitle}`;
            
            // Clear grid and maintain the scan line
            grid.innerHTML = '<div class="scan-line"></div>';

            // Inject the cards
            mallData[cat].forEach(item => {
                grid.innerHTML += buildCard(item);
            });
            
            // Clear search bar if navigating via sidebar
            document.getElementById('mallSearch').value = '';
        }

        // --- GLOBAL SEARCH ENGINE ---
        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            const title = document.getElementById('sectionHeading');
            
            if (query.length > 0) {
                title.innerText = "OVERRIDE: GLOBAL SEARCH RESULTS";
                grid.innerHTML = '<div class="scan-line"></div>';
                
                // Unhighlight sidebar
                document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));

                let found = false;
                Object.keys(mallData).forEach(cat => {
                    mallData[cat].forEach(item => {
                        if (item.n.toLowerCase().includes(query)) {
                            grid.innerHTML += buildCard(item);
                            found = true;
                        }
                    });
                });

                if(!found) {
                    grid.innerHTML += `<div style="color: var(--neon-purple); padding: 20px; font-weight: bold;">[!] NO MATCHES FOUND IN DATABASE.</div>`;
                }

            } else {
                // If search is empty, revert to the last clicked category
                const activeSidebarElement = Array.from(document.querySelectorAll('.menu-link'))
                    .find(el => el.getAttribute('onclick').includes(currentCategory));
                
                renderCategory(currentCategory, activeSidebarElement);
            }
        }

        // HTML string builder for grid items
        function buildCard(item) {
            return `
                <a href="${item.u}" target="_blank" class="grid-item">
                    <span class="icon-box">${item.i}</span>
                    <span class="item-name">${item.n}</span>
                </a>`;
        }

        // --- REALTIME CLOCK SYSTEM ---
        function updateClock() {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('clock').innerText = `SYSTEM ONLINE: ${dateStr} [${timeStr}]`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- SYSTEM INIT ---
        window.onload = () => {
            const firstNavElement = document.querySelector('.menu-link');
            renderCategory('ai_saas', firstNavElement);
        };
    </script>
</body>
</html>
