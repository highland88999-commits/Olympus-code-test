<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --hologram-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --black-bloom: #050505;
            --grid-border: rgba(188, 19, 254, 0.25);
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-hover: rgba(188, 19, 254, 0.15);
            --glow-cyan: 0 0 25px rgba(0, 242, 255, 0.6);
            --glow-purple: 0 0 20px rgba(188, 19, 254, 0.5);
            --transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: var(--black-bloom); color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* ... (keep your full CSS from OLYMPUS version, including bg-video, rain-canvas, bg-grid, top-nav, sidebar, overlay, cards, masks, controls) ... */

        /* Add share bar at bottom */
        .share-bar {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(5,5,5,0.9); border: 1px solid var(--grid-border);
            border-radius: 40px; padding: 10px 20px; display: flex; gap: 15px;
            z-index: 1400; backdrop-filter: blur(15px); flex-wrap: wrap; justify-content: center;
            max-width: 90%;
        }
        .share-btn {
            color: var(--neon-cyan); font-size: 1.2rem; cursor: pointer; transition: var(--transition);
            text-decoration: none;
        }
        .share-btn:hover { color: var(--neon-purple); transform: scale(1.2); }

        /* Adjust control-deck higher to fit above share bar */
        .control-deck { bottom: 160px; }
    </style>
</head>

        // Your existing populate grids, showSection (enhanced for dynamic), searchMall, toggleSidebar, rain, clock, controls

        // Add this new function for sharing
        function shareTo(platform) {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            const text = encodeURIComponent("Exploring the multiverse mall at OLYMPUS | ONLINE SHOPPING MALL — GHOST PROTOCOL 🌹👻");

            let shareUrl = '';
            switch(platform) {
                case 'twitter': shareUrl = `https://twitter.com/intent/tweet?url=${url}&text=${text}`; break;
                case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
                case 'linkedin': shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`; break;
                case 'reddit': shareUrl = `https://reddit.com/submit?url=${url}&title=${title}`; break;
                case 'whatsapp': shareUrl = `https://wa.me/?text=${text} ${url}`; break;
                case 'telegram': shareUrl = `https://t.me/share/url?url=${url}&text=${text}`; break;
                case 'email': shareUrl = `mailto:?subject=${title}&body=${text} ${url}`; break;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
        }

        // Optional: Web Share API fallback for mobile
        if (navigator.share) {

        }
