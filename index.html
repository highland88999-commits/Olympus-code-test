<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | NEXUS VORTEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --active-accent: var(--neon-cyan);
            --glitch-col: #ff0055;
            --transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Courier New', monospace; color:#fff; }
        
        /* INTERACTION LAYERS */
        canvas { position:fixed; top:0; left:0; z-index:1; cursor: grab; }
        canvas:active { cursor: grabbing; }

        .ui-wrapper { position: fixed; inset: 0; z-index: 10; pointer-events: none; transition: var(--transition); opacity: 1; }
        .ui-wrapper.hidden { opacity: 0; filter: contrast(150%) brightness(200%) blur(10px); pointer-events: none; transform: scale(0.95); }
        .ui-wrapper > * { pointer-events: auto; }

        /* THE LIGHTNING BOLT */
        .lightning-bolt {
            position:absolute; top:90px; left:50%; transform:translateX(-50%);
            font-size:3.5rem; color: var(--active-accent);
            text-shadow: 0 0 20px var(--active-accent), 0 0 40px var(--active-accent);
            animation: boltPulse 2s infinite alternate;
            pointer-events: none; z-index: 11;
        }
        @keyframes boltPulse { from { opacity: 0.4; transform: translateX(-50%) scale(0.9); } to { opacity: 1; transform: translateX(-50%) scale(1.1); } }

        /* NAVIGATION HEADER */
        .nav-header { padding:25px; display:flex; align-items:center; gap:20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .menu-btn, .mic-btn { 
            width:55px; height:55px; background:rgba(0,0,0,0.9); 
            border:2px solid var(--active-accent); border-radius:50%; 
            display:flex; align-items:center; justify-content:center; 
            color:var(--active-accent); cursor:pointer; 
            box-shadow: 0 0 15px var(--active-accent); transition: 0.4s;
        }
        .mic-btn.active { color:#ff0 !important; border-color:#ff0 !important; box-shadow: 0 0 30px #ff0 !important; animation: micVibe 0.2s infinite; }
        @keyframes micVibe { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .search-container { flex-grow:1; max-width:450px; margin: 0 auto; }
        #mallSearch { 
            width:100%; background:rgba(0,0,0,0.8); border:1px solid var(--active-accent); 
            padding:15px; border-radius:30px; color:#fff; text-align: center; outline:none;
            letter-spacing: 2px; text-transform: uppercase; font-size: 0.7rem;
        }

        /* SIDEBAR NAVIGATION */
        .sidebar { 
            position:fixed; top:0; left:-350px; width:300px; height:100%; 
            background:rgba(2,2,2,0.95); backdrop-filter:blur(50px); 
            border-right:1px solid var(--active-accent); z-index:4000; 
            transition: var(--transition); padding:120px 0; overflow-y:auto; 
        }
        .sidebar.active { left:0; box-shadow: 20px 0 100px rgba(0,255,255,0.2); }
        .menu-link { 
            padding:22px 40px; display:block; color:rgba(255,255,255,0.4); 
            text-transform:uppercase; letter-spacing:4px; font-size:0.7rem; 
            text-decoration: none; cursor:pointer; transition: 0.3s;
        }
        .menu-link:hover, .menu-link.active-link { color:var(--active-accent); background: rgba(0,255,255,0.05); border-left: 6px solid var(--active-accent); }

        /* VIEWPORT & GRID */
        .viewport { position: relative; height: 100vh; overflow-y: auto; padding: 180px 20px 100px; display: flex; flex-direction: column; align-items: center; scrollbar-width: none; }
        .cat-banner { color:var(--active-accent); letter-spacing:12px; font-weight:900; text-transform:uppercase; margin-bottom:70px; text-shadow: 0 0 20px var(--active-accent); font-size:1.5rem; text-align: center; }
        .icon-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:50px; width:100%; max-width:1100px; }

        /* HOLOGRAM CARDS */
        .hologram-card { text-decoration:none; display:flex; flex-direction:column; align-items:center; transition: 0.4s; }
        .hologram-card:hover { transform: translateY(-15px); }
        .video-circle {
            width:110px; height:110px; border-radius:50%; overflow:hidden; 
            border:2px solid var(--active-accent); box-shadow:0 0 25px var(--active-accent);
            position: relative; background: #000; transition: 0.4s;
        }
        .hologram-card:hover .video-circle { box-shadow: 0 0 50px var(--active-accent); }
        .card-icon { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:var(--active-accent); z-index:2; }
        .card-img { width:100%; height:100%; object-fit:cover; opacity:0.5; position: absolute; }
        .label { margin-top:20px; font-size:0.6rem; letter-spacing:3px; text-transform:uppercase; font-weight:bold; text-align:center; color:#fff; opacity: 0.7; }

        /* THE SHIELD */
        #immersion-shield { position: fixed; inset: 0; z-index: 5; display: none; background: transparent; cursor: pointer; }

        /* GLITCH OVERLAY */
        #glitch-overlay {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            display: none; opacity: 0.3;
        }
    </style>
</head>
<body onclick="resumeAudio()">

    <div id="glitch-overlay"></div>
    <canvas id="galaxy-canvas"></canvas>
    <div id="immersion-shield"></div>

    <div id="ui-wrapper" class="ui-wrapper">
        <div class="lightning-bolt" id="lightning"><i class="fa-solid fa-bolt"></i></div>
        <header class="nav-header">
            <button class="menu-btn" id="burger"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="SEARCH MULTIVERSE..." onkeyup="searchMall()">
            </div>
            <button class="mic-btn" id="micBtn"><i class="fa-solid fa-microphone"></i></button>
        </header>
        <nav class="sidebar" id="sidebar"></nav>
        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Olympus Syncing...</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 20000);
        const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 0.3;

        // MULTIVERSE ASSETS
        let isCollapsing = false;
        const starCount = 35000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const homePos = new Float32Array(starCount * 3);
        
        for(let i=0; i < starCount * 3; i++) {
            const p = THREE.MathUtils.randFloatSpread(9000);
            starPos[i] = p; homePos[i] = p;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color:0x00ffff, size:2.2, transparent:true, opacity:0.9, blending: THREE.AdditiveBlending});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        const sun = new THREE.Mesh(new THREE.SphereGeometry(100,64,64), new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff, emissiveIntensity:6}));
        scene.add(sun);
        const light = new THREE.PointLight(0x00ffff, 20, 10000);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.set(0, 500, 2500);

        // AUDIO ENGINE
        let audioCtx, analyser, dataArray, micActive = false;
        window.resumeAudio = () => { if(audioCtx) audioCtx.resume(); };

        document.getElementById('micBtn').onclick = async (e) => {
            e.stopPropagation();
            if (!micActive) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    const source = audioCtx.createMediaStreamSource(stream);
                    analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    micActive = true; 
                    document.getElementById('micBtn').classList.add('active');
                } catch(err) { alert("Mic Access Denied"); }
            } else {
                micActive = false;
                document.getElementById('micBtn').classList.remove('active');
            }
        };

        // INTERACTION MODES
        const ui = document.getElementById('ui-wrapper');
        const shield = document.getElementById('immersion-shield');
        const glitch = document.getElementById('glitch-overlay');

        controls.addEventListener('start', () => {
            ui.classList.add('hidden');
            shield.style.display = 'block';
        });

        shield.onclick = () => {
            ui.classList.remove('hidden');
            shield.style.display = 'none';
        };

        window.updateGalaxy = (hex) => {
            const c = new THREE.Color(hex);
            sun.material.color.set(c); sun.material.emissive.set(c);
            stars.material.color.set(c); light.color.set(c);
            document.documentElement.style.setProperty('--active-accent', hex);
        };

        // COLLAPSE CYCLE (3 MINS)
        setInterval(() => {
            isCollapsing = true;
            glitch.style.display = 'block';
            setTimeout(() => {
                isCollapsing = false;
                glitch.style.display = 'none';
                const palette = ['#00ffff', '#bc13fe', '#ff0055', '#00ff66', '#ffaa00', '#ffffff'];
                window.updateGalaxy(palette[Math.floor(Math.random()*palette.length)]);
            }, 8000);
        }, 180000);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const posAttr = stars.geometry.attributes.position;

            if (isCollapsing) {
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    posAttr.array[idx] *= 0.92;
                    posAttr.array[idx+1] *= 0.92;
                    posAttr.array[idx+2] *= 0.92;
                }
                sun.scale.multiplyScalar(1.05);
                if(sun.scale.x > 15) sun.scale.set(0.01, 0.01, 0.01);
            } else {
                let intensity = 0;
                if(micActive && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    intensity = dataArray[4] / 255;
                }
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    // VIBRATION MAGIC
                    const freq = 0.2;
                    const amp = intensity * 120;
                    posAttr.array[idx] = THREE.MathUtils.lerp(posAttr.array[idx], homePos[idx] + (Math.sin(Date.now() * freq + i) * amp), 0.1);
                }
                sun.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
            }
            posAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>

    <script>
        // DATA SYNC ARCHITECTURE
        const REPO_DATA = "https://raw.githubusercontent.com/highland88999-commits/Olympus-code-test/main/data.json";
        let localStore = {};
        let catArray = [];

        async function initialize() {
            try {
                const res = await fetch(`${REPO_DATA}?v=${Date.now()}`);
                if (!res.ok) throw new Error("Fetch Error");
                const data = await res.json();
                
                catArray = data.categories || [];
                localStore = data.links || {};
                
                const sb = document.getElementById('sidebar');
                sb.innerHTML = ''; 

                catArray.forEach(cat => {
                    const btn = document.createElement('div');
                    btn.className = 'menu-link';
                    btn.id = `nav-${cat.id}`;
                    btn.innerText = cat.name;
                    btn.onclick = () => { renderView(cat.id); toggleMenu(false); };
                    sb.appendChild(btn);
                });
                
                if (catArray.length > 0) renderView(catArray[0].id);
            } catch (err) {
                document.getElementById('cat-indicator').innerText = "SYSTEM OFFLINE: RE-SYNC REQUIRED";
                console.error("Olympus Sync Failed:", err);
            }
        }

        function renderView(id) {
            const grid = document.getElementById('mallGrid');
            const colors = { core: '#00ffff', featured: '#bc13fe', finance: '#FFD700', tech: '#00ff66' };
            
            if(window.updateGalaxy) window.updateGalaxy(colors[id] || '#00ffff');

            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(`nav-${id}`)?.classList.add('active-link');
            
            const category = catArray.find(c => c.id === id);
            document.getElementById('cat-indicator').innerText = category ? category.name : id;
            
            grid.innerHTML = '';
            const items = localStore[id] || [];
            
            if(items.length === 0) grid.innerHTML = '<p style="opacity:0.2; letter-spacing:5px;">VOID_NULL</p>';

            items.forEach(item => {
                grid.innerHTML += `
                    <a href="${item.u}" target="_blank" class="hologram-card">
                        <div class="video-circle">
                            ${item.img ? `<img src="${item.img}" class="card-img" onerror="this.style.display='none'">` : ''}
                            <div class="card-icon"><i class="${item.i || 'fa-solid fa-satellite'}"></i></div>
                        </div>
                        <div class="label">${item.n}</div>
                    </a>`;
            });
        }

        const sb = document.getElementById('sidebar');
        const burger = document.getElementById('burger');
        function toggleMenu(s) { if(s === false) sb.classList.remove('active'); else sb.classList.toggle('active'); }
        burger.onclick = (e) => { e.stopPropagation(); toggleMenu(); };
        window.onclick = (e) => { if(!sb.contains(e.target) && !burger.contains(e.target)) toggleMenu(false); };

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            if(!query) { renderView(catArray[0].id); return; }
            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';
            Object.values(localStore).flat().forEach(item => {
                if(item.n.toLowerCase().includes(query)) {
                    grid.innerHTML += `
                        <a href="${item.u}" target="_blank" class="hologram-card">
                            <div class="video-circle">
                                ${item.img ? `<img src="${item.img}" class="card-img">` : ''}
                                <div class="card-icon"><i class="${item.i || 'fa-solid fa-link'}"></i></div>
                            </div>
                            <div class="label">${item.n}</div>
                        </a>`;
                }
            });
        }

        initialize();
    </script>
</body>
</html>
