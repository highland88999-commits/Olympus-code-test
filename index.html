<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | GRAND MULTIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --active-accent: var(--neon-cyan);
            --black-bloom: #050505;
            --transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; color:#fff; }
        canvas { position:fixed; top:0; left:0; z-index:1; cursor: grab; }

        .ui-wrapper { position: fixed; inset: 0; z-index: 10; pointer-events: none; transition: var(--transition); }
        .ui-wrapper.hidden { opacity: 0; filter: blur(20px); pointer-events: none; }
        .ui-wrapper > * { pointer-events: auto; }

        /* LIGHTNING BOLT */
        .lightning-bolt {
            position:absolute; top:85px; left:50%; transform:translateX(-50%);
            font-size:3.5rem; color: var(--active-accent);
            text-shadow:0 0 30px var(--active-accent);
            animation:boltPulse 3.4s infinite ease-in-out;
            pointer-events: none; z-index: 11;
        }
        @keyframes boltPulse { 0%,100%{opacity:0.6;transform:translateX(-50%) scale(1.1);} 50%{opacity:1;transform:translateX(-50%) scale(1.3);} }

        /* NAV */
        .nav-header { padding:22px; display:flex; align-items:center; gap:18px; background:linear-gradient(to bottom,rgba(0,0,0,0.95),transparent); }
        .menu-btn, .mic-btn { 
            width:52px; height:52px; background:rgba(0,0,0,0.8); 
            border:2px solid var(--active-accent); border-radius:50%; 
            display:flex; align-items:center; justify-content:center; 
            color:var(--active-accent); cursor:pointer; box-shadow: 0 0 15px var(--active-accent);
        }
        .mic-btn.active { color:#ff0; border-color: #ff0; box-shadow:0 0 30px #ff0; }

        .search-container { flex-grow:1; max-width:500px; margin: 0 auto; }
        #mallSearch { 
            width:100%; background:rgba(0,0,0,0.9); border:1.5px solid rgba(0,255,255,0.2); 
            padding:14px 25px; border-radius:40px; color:#fff; outline:none; text-align: center;
        }

        /* SIDEBAR */
        .sidebar { 
            position:fixed; top:0; left:-340px; width:320px; height:100%; 
            background:rgba(5,5,5,0.98); backdrop-filter:blur(40px); 
            border-right:1px solid var(--active-accent); z-index:4000; 
            transition: var(--transition); padding:100px 0; overflow-y:auto; 
        }
        .sidebar.active { left:0; }
        .menu-link { padding:20px 35px; display:block; color:#777; text-transform:uppercase; letter-spacing:3px; font-size:0.75rem; text-decoration: none; cursor:pointer; transition: 0.3s; }
        .menu-link:hover, .menu-link.active-link { color:var(--active-accent); background: rgba(0,255,255,0.05); box-shadow: inset 5px 0 0 var(--active-accent); }

        /* VIEWPORT */
        .viewport { position: relative; height: 100vh; overflow-y: auto; padding: 160px 20px 100px; display: flex; flex-direction: column; align-items: center; scrollbar-width: none; }
        .cat-banner { color:var(--active-accent); letter-spacing:15px; font-weight:900; text-transform:uppercase; margin-bottom:60px; text-shadow: 0 0 25px var(--active-accent); font-size:1.4rem; text-align: center; }
        .icon-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:40px; width:100%; max-width:1200px; }

        /* CARDS */
        .hologram-card { text-decoration:none; display:flex; flex-direction:column; align-items:center; transition: 0.4s; }
        .hologram-card:hover { transform: translateY(-10px) scale(1.05); }
        .video-circle {
            width:130px; height:130px; border-radius:50%; overflow:hidden; 
            border:2px solid var(--active-accent); box-shadow:0 0 30px var(--active-accent);
            position: relative; background: #000;
        }
        .card-icon { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2.2rem; color:var(--active-accent); z-index:2; text-shadow:0 0 15px var(--active-accent); }
        .card-img { width:100%; height:100%; object-fit:cover; opacity:0.6; position: absolute; }
        .label { margin-top:18px; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; font-weight:bold; text-align:center; color:#fff; }

        #immersion-shield { position: fixed; inset: 0; z-index: 5; display: none; }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>
    <div id="immersion-shield"></div>

    <div id="ui-wrapper" class="ui-wrapper">
        <div class="lightning-bolt" id="lightning"><i class="fa-solid fa-bolt"></i></div>
        <header class="nav-header">
            <button class="menu-btn" id="burger"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="ACCESSING OLYMPUS DATA..." onkeyup="searchMall()">
            </div>
            <button class="mic-btn" id="micBtn"><i class="fa-solid fa-microphone"></i></button>
        </header>
        <nav class="sidebar" id="sidebar"></nav>
        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Syncing Multiverse...</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 15000);
        const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

        // VORTEX PARAMS
        let isCollapsing = false;
        const starCount = 20000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const originalPos = new Float32Array(starCount * 3);
        
        for(let i=0; i < starCount * 3; i++) {
            const p = THREE.MathUtils.randFloatSpread(8000);
            starPos[i] = p; originalPos[i] = p;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color:0x00ffff, size:2, transparent:true, opacity:0.8, blending: THREE.AdditiveBlending});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        const sun = new THREE.Mesh(new THREE.SphereGeometry(80,64,64), new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff, emissiveIntensity:4}));
        scene.add(sun);
        const light = new THREE.PointLight(0x00ffff, 15, 8000);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.z = 2000;

        // AUDIO
        let analyser, dataArray, micActive = false;
        document.getElementById('micBtn').onclick = async () => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            micActive = true; document.getElementById('micBtn').classList.add('active');
        };

        // GALAXY IMMERSION
        const ui = document.getElementById('ui-wrapper');
        const shield = document.getElementById('immersion-shield');
        controls.addEventListener('start', () => { ui.classList.add('hidden'); shield.style.display = 'block'; });
        shield.onclick = () => { ui.classList.remove('hidden'); shield.style.display = 'none'; };

        // COLOR SHIFT & RESET
        const palette = ['#00ffff', '#bc13fe', '#ff0055', '#00ff66', '#ffaa00', '#ffffff'];
        window.updateGalaxy = (hex) => {
            const c = new THREE.Color(hex);
            sun.material.color.set(c); sun.material.emissive.set(c);
            stars.material.color.set(c); light.color.set(c);
            document.documentElement.style.setProperty('--active-accent', hex);
        };

        // THE DEVOURER CYCLE (Every 3 Mins)
        setInterval(() => { triggerVortex(); }, 180000);

        function triggerVortex() {
            isCollapsing = true;
            setTimeout(() => {
                isCollapsing = false;
                // Re-birth
                window.updateGalaxy(palette[Math.floor(Math.random()*palette.length)]);
            }, 6000);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const posAttr = stars.geometry.attributes.position;

            if (isCollapsing) {
                // VACUUM EFFECT
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    posAttr.array[idx] *= 0.94;
                    posAttr.array[idx+1] *= 0.94;
                    posAttr.array[idx+2] *= 0.94;
                }
                sun.scale.multiplyScalar(1.02);
                if(sun.scale.x > 5) sun.scale.set(0.1, 0.1, 0.1); // "Devoured"
            } else {
                // REGULAR ORBIT + VIBRATE
                let bass = 0;
                if(micActive && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    bass = dataArray[2] / 255;
                }
                
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    const vibe = (Math.sin(Date.now() * 0.1) * (bass * 60));
                    posAttr.array[idx] = THREE.MathUtils.lerp(posAttr.array[idx], originalPos[idx] + vibe, 0.1);
                    posAttr.array[idx+1] = THREE.MathUtils.lerp(posAttr.array[idx+1], originalPos[idx+1], 0.1);
                    posAttr.array[idx+2] = THREE.MathUtils.lerp(posAttr.array[idx+2], originalPos[idx+2], 0.1);
                }
                sun.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
            }
            posAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>

    <script>
        // DATA SYNC LOGIC
        const DATA_SOURCE = "https://raw.githubusercontent.com/highland88999-commits/Olympus-code-test/main/data.json";
        let linkData = {};
        let categories = [];

        async function boot() {
            try {
                // Cache busting to prevent "Empty Menu" on repeat visits
                const res = await fetch(`${DATA_SOURCE}?t=${Date.now()}`);
                const data = await res.json();
                
                // Safety check for data structure
                categories = data.categories || [];
                linkData = data.links || {};
                
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = ''; // Clear old loaders
                
                if(categories.length === 0) throw new Error("No categories found");

                categories.forEach(cat => {
                    const a = document.createElement('a');
                    a.className = 'menu-link';
                    a.id = `link-${cat.id}`;
                    a.innerText = cat.name;
                    a.onclick = () => { showSection(cat.id); toggleMenu(false); };
                    sidebar.appendChild(a);
                });
                
                showSection(categories[0].id);
            } catch (e) {
                document.getElementById('cat-indicator').innerText = "SYNC FAILED. CHECK DATA.JSON Structure.";
                console.error("Olympus Data Error:", e);
            }
        }

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const colorMap = { core: '#00ffff', featured: '#bc13fe', finance: '#FFD700', afterlife: '#ffffff', tech: '#00ff66' };
            
            if(window.updateGalaxy) window.updateGalaxy(colorMap[id] || '#00ffff');

            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(`link-${id}`)?.classList.add('active-link');
            
            const currentCat = categories.find(c => c.id === id);
            document.getElementById('cat-indicator').innerText = currentCat ? currentCat.name : id;
            
            grid.innerHTML = '';
            const items = linkData[id] || [];
            
            if(items.length === 0) {
                grid.innerHTML = '<div style="color:rgba(255,255,255,0.3); letter-spacing:5px;">VOID DETECTED IN SECTOR</div>';
            }

            items.forEach(item => {
                grid.innerHTML += `
                    <a href="${item.u}" target="_blank" class="hologram-card">
                        <div class="video-circle">
                            ${item.img ? `<img src="${item.img}" class="card-img" onerror="this.style.display='none'">` : ''}
                            <div class="card-icon"><i class="${item.i || 'fa-solid fa-link'}"></i></div>
                        </div>
                        <div class="label">${item.n}</div>
                    </a>`;
            });
        }

        // UI HELPERS
        const sidebar = document.getElementById('sidebar');
        const burger = document.getElementById('burger');
        function toggleMenu(state) {
            if(state === false) sidebar.classList.remove('active');
            else sidebar.classList.toggle('active');
        }
        burger.onclick = (e) => { e.stopPropagation(); toggleMenu(); };
        window.onclick = (e) => { if(!sidebar.contains(e.target) && !burger.contains(e.target)) toggleMenu(false); };

        function searchMall() {
            const q = document.getElementById('mallSearch').value.toLowerCase();
            if(!q) { showSection(categories[0].id); return; }
            document.getElementById('cat-indicator').innerText = "CROSS-SECTOR SEARCH";
            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';
            Object.values(linkData).flat().forEach(item => {
                if(item.n.toLowerCase().includes(q)) {
                    grid.innerHTML += `
                        <a href="${item.u}" target="_blank" class="hologram-card">
                            <div class="video-circle">
                                ${item.img ? `<img src="${item.img}" class="card-img">` : ''}
                                <div class="card-icon"><i class="${item.i || 'fa-solid fa-link'}"></i></div>
                            </div>
                            <div class="label">${item.n}</div>
                        </a>`;
                }
            });
        }

        boot();
    </script>
</body>
</html>
