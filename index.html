<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ROSE GARDEN — HOLOGRAPHIC PLAZA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --hologram-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --black-bloom: rgba(0, 0, 0, 0.92);
            --glow: 0 0 25px rgba(0, 243, 255, 0.6);
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* Ambient Background */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -2; filter: brightness(0.3) contrast(1.2) blur(2px);
            object-fit: cover;
        }

        #rain-canvas {
            position: fixed; top: 0; left: 0;
            z-index: -1; pointer-events: none; opacity: 0.4;
        }

        /* Navigation */
        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 2100;
            background: rgba(0,0,0,0.7); border: 1px solid var(--hologram-blue);
            color: var(--hologram-blue); padding: 12px 18px; border-radius: 4px;
            cursor: pointer; backdrop-filter: blur(15px); transition: var(--transition);
        }
        .menu-btn:hover { box-shadow: var(--glow); transform: rotate(90deg); }

        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(0, 0, 0, 0.98); border-right: 1px solid var(--hologram-blue);
            z-index: 2000; transition: var(--transition); padding: 100px 30px;
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .menu-link {
            color: #fff; text-decoration: none; font-size: 0.8rem;
            letter-spacing: 4px; text-transform: uppercase; padding: 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1); transition: 0.3s;
        }
        .menu-link:hover { color: var(--hologram-blue); padding-left: 20px; }

        /* Holographic Card & Video Masking */
        .overlay { position: relative; z-index: 10; padding: 120px 20px 200px; max-width: 1300px; margin: 0 auto; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); letter-spacing: 20px; text-shadow: var(--glow); margin: 0; text-transform: uppercase; }
        .subtext { color: var(--hologram-blue); letter-spacing: 12px; font-size: 0.9rem; margin-top: 20px; text-transform: uppercase; opacity: 0.8; }

        section { width: 100%; margin-bottom: 150px; scroll-margin-top: 120px; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 40px; }

        .hologram-card {
            aspect-ratio: 1/1.2; background: var(--black-bloom);
            border: 1px solid rgba(0, 243, 255, 0.15); border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; position: relative; overflow: hidden; transition: var(--transition);
        }
        .hologram-card:hover { transform: translateY(-15px); border-color: #fff; box-shadow: var(--glow); }

        /* THE MAGIC: Video lives inside this container masked by an SVG */
        .video-mask-container {
            width: 120px; height: 120px;
            position: relative; margin-bottom: 25px;
            /* Default Mask (Circle/Portal) */
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
        }

        .masked-video-source {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(1.2) contrast(1.1);
        }

        /* Specific Masks for Categories */
        .mask-burger { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 12C2 12 5 7 12 7C19 7 22 12 22 12M2 14H22M4 17H20M5 20H19"/></svg>'); }
        .mask-cocktail { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 3L12 11L19 3M5 3H19M12 11V21M7 21H17"/></svg>'); }
        .mask-hat { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 19C5 19 6 17 6 15V10C6 6 9 3 12 3C15 3 18 6 18 10V15C18 17 19 19 22 19H2"/></svg>'); }
        .mask-elysium { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L3 7V17L12 22L21 17V7L12 2Z"/></svg>'); }

        .label { font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; color: #fff; opacity: 0.7; transition: 0.3s; }
        .hologram-card:hover .label { opacity: 1; color: var(--hologram-blue); }

        /* Control Deck (Non-Blocking) */
        .control-deck {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 550px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--hologram-blue); border-radius: 40px;
            padding: 15px 25px; display: flex; justify-content: space-around;
            z-index: 1500; pointer-events: none; backdrop-filter: blur(20px);
        }
        .slider-group { display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        input[type=range] { writing-mode: bt-lr; appearance: slider-vertical; height: 70px; width: 6px; cursor: pointer; }
        .slider-label { font-size: 0.6rem; margin-top: 8px; letter-spacing: 2px; color: var(--hologram-blue); text-transform: uppercase; }

        footer { padding: 100px; opacity: 0.25; letter-spacing: 8px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

    <nav class="sidebar" id="sidebar">
        <a href="#" class="menu-link" onclick="toggleSidebar()">Digital Mall Home</a>
        <a href="#food" class="menu-link" onclick="toggleSidebar()">Food & Spirits</a>
        <a href="#headgear" class="menu-link" onclick="toggleSidebar()">Headgear</a>
        <a href="#elysium" class="menu-link" onclick="toggleSidebar()">Elysium Gate</a>
    </nav>

    <video muted loop playsinline id="bg-video">
        <source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4">
    </video>

    <canvas id="rain-canvas"></canvas>

    <div class="overlay">
        <header>
            <h1>THE ROSE GARDEN</h1>
            <div class="subtext">VIRTUAL SHOPPING PLAZA</div>
        </header>

        <section id="food">
            <div class="icon-grid">
                <a href="https://www.ubereats.com" target="_blank" class="hologram-card">
                    <div class="video-mask-container mask-burger">
                        <video class="masked-video-source" muted loop playsinline autoplay>
                            <source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="label">Uber Eats</div>
                </a>

                <a href="https://minibardelivery.com" target="_blank" class="hologram-card">
                    <div class="video-mask-container mask-cocktail">
                        <video class="masked-video-source" muted loop playsinline autoplay>
                            <source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="label">Minibar</div>
                </a>
            </div>
        </section>

        <section id="headgear">
            <div class="icon-grid">
                <a href="https://hats.com" target="_blank" class="hologram-card">
                    <div class="video-mask-container mask-hat">
                        <video class="masked-video-source" muted loop playsinline autoplay>
                            <source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="label">Hats.com</div>
                </a>
            </div>
        </section>

        <section id="elysium">
            <div class="icon-grid" style="grid-template-columns: 1fr;">
                <a href="https://the-afterlife.vercel.app/" target="_blank" class="hologram-card" style="max-width: 400px; margin: 0 auto;">
                    <div class="video-mask-container mask-elysium" style="width:160px; height:160px;">
                        <video class="masked-video-source" muted loop playsinline autoplay>
                            <source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="label" style="color:var(--neon-pink); letter-spacing: 6px;">ENTER ELYSIUM</div>
                </a>
            </div>
        </section>

        <footer>DIRECTED BY HERMES — EST 2026</footer>
    </div>

    <div class="control-deck">
        <div class="slider-group">
            <input type="range" id="zoom-range" min="180" max="450" value="240">
            <span class="slider-label">Zoom</span>
        </div>
        <div class="slider-group">
            <input type="range" id="bloom-range" min="10" max="100" value="30">
            <span class="slider-label">Bloom</span>
        </div>
        <div class="slider-group">
            <input type="range" id="rain-range" min="0" max="100" value="40">
            <span class="slider-label">Rain</span>
        </div>
    </div>

    <script>
        // Matrix Rain System
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops;

        function initRain() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            drops = Array(Math.floor(w / 20)).fill(1);
        }

        function drawRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#00f3ff';
            ctx.font = '14px monospace';
            drops.forEach((y, i) => {
                const text = Math.random() > 0.5 ? '⚡' : '✧';
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > h && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        
        let rainInterval = setInterval(drawRain, 50);
        initRain();
        window.onresize = initRain;

        // UI Interaction
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        document.getElementById('zoom-range').oninput = (e) => {
            document.querySelectorAll('.icon-grid').forEach(g => {
                g.style.gridTemplateColumns = `repeat(auto-fit, minmax(${e.target.value}px, 1fr))`;
            });
        };

        document.getElementById('bloom-range').oninput = (e) => {
            document.getElementById('bg-video').style.filter = `brightness(${e.target.value / 100}) grayscale(0.4) contrast(1.2)`;
        };

        // Click outside sidebar to close
        document.addEventListener('click', (e) => {
            const sb = document.getElementById('sidebar');
            if(sb.classList.contains('active') && !sb.contains(e.target) && !e.target.closest('.menu-btn')) toggleSidebar();
        });
    </script>
</body>
</html>
