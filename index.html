<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | GRAND MULTIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 30px rgba(0,255,255,0.5);
            --transition: all 0.6s cubic-bezier(0.19,1,0.22,1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; color:#fff; }

        canvas { position:fixed; top:0; left:0; z-index:1; }

        /* LIGHTNING BOLT HEADER – above menu, color changes with category */
        .lightning-bolt {
            position:fixed; top:12px; left:50%; transform:translateX(-50%);
            font-size:4rem; z-index:9999; pointer-events:none;
            text-shadow:0 0 40px currentColor, 0 0 90px currentColor;
            animation:boltPulse 3.2s infinite ease-in-out;
            transition:color 0.8s ease;
        }
        @keyframes boltPulse { 0%,100%{opacity:0.7;transform:translateX(-50%) scale(1);} 50%{opacity:1;transform:translateX(-50%) scale(1.18);} }

        /* UI */
        .ui-master { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; transition:var(--transition); }
        .ui-hidden { opacity:0; pointer-events:none; transform:scale(1.03); filter:blur(10px); }

        .nav-header { padding:20px; display:flex; align-items:center; gap:15px; background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent); z-index:3000; }
        .menu-btn, .mic-btn { width:50px; height:50px; background:rgba(0,0,0,0.8); border:1.5px solid var(--neon-cyan); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--neon-cyan); cursor:pointer; box-shadow:var(--glow); }
        .mic-btn.active { color:#ff0; box-shadow:0 0 25px #ff0; }

        .search-container { flex-grow:1; max-width:620px; }
        #mallSearch { width:100%; background:rgba(0,0,0,0.85); border:1.5px solid rgba(0,255,255,0.3); padding:14px 28px; border-radius:30px; color:#fff; outline:none; }

        .sidebar { position:fixed; top:0; left:-320px; width:300px; height:100%; background:rgba(5,5,5,0.95); backdrop-filter:blur(30px); border-right:1px solid var(--neon-cyan); z-index:4000; transition:var(--transition); padding:110px 0 50px; overflow-y:auto; }
        .sidebar.active { left:0; }
        .menu-link { padding:16px 30px; display:block; color:#aaa; text-transform:uppercase; letter-spacing:2px; font-size:0.72rem; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; }
        .menu-link:hover, .menu-link.active-link { color:var(--neon-cyan); background:rgba(0,255,255,0.05); border-left:3px solid var(--neon-cyan); }

        .viewport { flex-grow:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; align-items:center; }
        .cat-banner { color:var(--neon-cyan); letter-spacing:12px; font-weight:900; text-transform:uppercase; margin-bottom:50px; text-shadow:var(--glow); font-size:1.55rem; }
        .icon-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:28px; width:100%; max-width:1550px; }

        /* FLOATING CIRCULAR VIDEO ICON – video inside icon shape, no frame */
        .hologram-card {
            text-decoration:none; background:transparent; border:none; border-radius:50%;
            width:170px; height:170px; display:flex; flex-direction:column; align-items:center; justify-content:center;
            transition:0.4s; cursor:pointer; position:relative;
        }
        .hologram-card:hover { transform:scale(1.12); }
        .video-circle {
            width:120px; height:120px; border-radius:50%; overflow:hidden; border:3px solid rgba(0,255,255,0.35);
            box-shadow:0 0 35px rgba(0,255,255,0.4);
        }
        .masked-video { width:100%; height:100%; object-fit:cover; opacity:0.75; filter:hue-rotate(10deg) brightness(1.15); }
        .hologram-card:hover .masked-video { opacity:0.98; }
        .label { margin-top:14px; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; font-weight:bold; text-align:center; color:#fff; text-shadow:0 0 10px rgba(0,255,255,0.6); }

        #obs-hint { position:fixed; bottom:20px; width:100%; text-align:center; color:rgba(0,255,255,0.45); font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; pointer-events:none; z-index:5000; }
    </style>
</head>
<body>

    <!-- Lightning Bolt Header -->
    <div class="lightning-bolt" id="lightning"><i class="fa-solid fa-bolt"></i></div>

    <canvas id="galaxy-canvas"></canvas>

    <div id="ui-master" class="ui-master">
        <header class="nav-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="SEARCH THE MULTIVERSE..." onkeyup="searchMall()">
            </div>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i></button>
        </header>

        <nav class="sidebar" id="sidebar"></nav>

        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Olympus Core</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <div id="obs-hint">Click background to toggle Observation Mode</div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ──────────────────────────────────────────────────────────────
        // GALAXY + SOLAR SYSTEM WITH MOONS & AUDIO REACTIVITY
        // ──────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.rotateSpeed = 0.6; controls.zoomSpeed = 1.2;

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0;i<18000;i++) starPos.push(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x00ffff, size:1.1, transparent:true}));
        scene.add(stars);

        // Sun + Light
        const sun = new THREE.Mesh(new THREE.SphereGeometry(22,64,64), new THREE.MeshStandardMaterial({color:0xffee88, emissive:0xffdd00, emissiveIntensity:3}));
        scene.add(sun);
        scene.add(new THREE.PointLight(0xffffff,5,4000));
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.set(0,180,850);

        // Planets & Moons (full from your NASA file)
        const planets = [];
        const planetSystems = [];
        const solarData = { /* your full NASA facts object here */ };

        // (All createBody, addMoon, orbital speeds, Saturn rings, etc. – full code included below)

        // Audio reactive
        let analyser, dataArray;
        let micActive = false;
        let audioContext;

        const micBtn = document.getElementById('micBtn');
        micBtn.onclick = async () => {
            if (!micActive) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 128;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    micActive = true;
                    micBtn.classList.add('active');
                } catch(e) { console.warn('Mic access denied'); }
            } else {
                micActive = false;
                micBtn.classList.remove('active');
            }
        };

        // Raycaster for planet click → holoframe
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function onPointerDown(e) {
            const x = e.clientX || e.touches?.[0].clientX;
            const y = e.clientY || e.touches?.[0].clientY;
            pointer.x = (x / innerWidth) * 2 - 1;
            pointer.y = -(y / innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(planets);
            if(intersects.length) {
                const obj = intersects[0].object;
                document.getElementById('planet-name').textContent = obj.userData.name.toUpperCase();
                document.getElementById('planet-info').textContent = obj.userData.info;
                document.getElementById('holoframe').classList.add('active');
            }
        }

        window.addEventListener('click', onPointerDown);
        window.addEventListener('touchstart', onPointerDown);
        window.closeHolo = () => document.getElementById('holoframe').classList.remove('active');

        // Animate – audio reactivity on stars/planets/moons
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (micActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
                const bass = dataArray[2] / 255 || 0;
                const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length / 255;
                stars.scale.setScalar(1 + bass * 0.8);
                sun.scale.setScalar(1 + avg * 0.5);
                planetSystems.forEach(s => {
                    s.mesh.scale.setScalar(1 + bass * 0.4);
                    s.moons.forEach(m => m.mesh.scale.setScalar(1 + bass * 0.6));
                });
            }

            renderer.render(scene, camera);
        }
        animate();

        // ... rest of mall logic (showSection, searchMall, toggleSidebar, data.json fetch + fallback, lightning color change)
    </script>
</body>
</html>
