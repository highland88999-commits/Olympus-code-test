<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>OLYMPUS | GRAND MULTIVERSE</title>

    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 20px rgba(0,255,255,0.4);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; color: #fff; }

        /* GALAXY CANVAS */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* UI MASTER TOGGLE */
        .ui-master { position: fixed; inset: 0; opacity: 1; transition: var(--transition); pointer-events: all; z-index: 2; display: flex; flex-direction: column; }
        .ui-hidden { opacity: 0; pointer-events: none; transform: scale(1.02); filter: blur(8px); }

        /* TOP NAVIGATION */
        .nav-header {
            padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 3000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .menu-btn {
            width: 50px; height: 50px; flex-shrink: 0; background: rgba(0,0,0,0.8);
            border: 1.5px solid var(--neon-cyan); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan); font-size: 1.2rem; cursor: pointer; box-shadow: var(--glow);
        }

        .search-container { flex-grow: 1; max-width: 600px; margin: 0 auto; }
        #mallSearch {
            width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border: 1.5px solid rgba(0,255,255,0.3); padding: 12px 25px;
            border-radius: 30px; color: #fff; outline: none; box-shadow: var(--glow);
            font-size: 0.9rem; box-sizing: border-box; transition: 0.3s;
        }
        #mallSearch:focus { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.5); }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(30px);
            border-right: 1px solid var(--neon-cyan); z-index: 4000;
            transition: var(--transition); padding: 100px 0 50px 0; overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
        .sidebar.active { left: 0; }
        .menu-link {
            padding: 16px 30px; display: block; color: #aaa; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem;
            border-bottom: 1px solid rgba(0,255,255,0.05); transition: 0.3s; cursor: pointer;
        }
        .menu-link:hover, .menu-link.active-link { color: var(--neon-cyan); background: rgba(0,255,255,0.05); padding-left: 40px; border-left: 3px solid var(--neon-cyan); }

        /* MALL VIEWPORT */
        .viewport {
            flex-grow: 1; overflow-y: auto; padding: 20px 20px 100px;
            display: flex; flex-direction: column; align-items: center;
            scrollbar-width: none; cursor: crosshair;
        }
        .viewport::-webkit-scrollbar { display: none; }

        .cat-banner {
            color: var(--neon-cyan); letter-spacing: 12px; font-weight: 900;
            text-transform: uppercase; margin-bottom: 50px; text-shadow: var(--glow);
            text-align: center; font-size: 1.5rem; pointer-events: none;
        }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px; width: 100%; max-width: 1500px; pointer-events: none; /* Let clicks pass to viewport if hitting empty grid space */
        }

        /* HOLOGRAM CARDS */
        .hologram-card {
            background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,255,0.15); border-radius: 15px;
            text-decoration: none; overflow: hidden; transition: 0.4s;
            display: flex; flex-direction: column; pointer-events: auto; /* Re-enable clicks for cards */
            cursor: pointer;
        }
        .hologram-card:hover {
            transform: translateY(-8px); border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0,255,255,0.4);
        }
        .video-box { width: 100%; height: 110px; background: #000; position: relative; }
        .masked-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: hue-rotate(10deg); }
        .label {
            padding: 15px; color: #fff; font-size: 0.7rem; text-align: center;
            letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold;
        }

        #obs-hint {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            color: rgba(0,255,255,0.4); font-size: 0.6rem; letter-spacing: 3px;
            text-transform: uppercase; pointer-events: none; z-index: 5000;
        }
    </style>
</head>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.2;
        controls.enableZoom = true;

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 25000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 1.2, transparent: true, opacity: 0.7 });
        scene.add(new THREE.Points(geometry, material));

        const sun = new THREE.Mesh(new THREE.SphereGeometry(60, 64, 64), new THREE.MeshStandardMaterial({color: 0xbc13fe, emissive: 0xbc13fe, emissiveIntensity: 2}));
        scene.add(sun);
        
        scene.add(new THREE.PointLight(0x00ffff, 4, 4000));
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.z = 1200;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // IMMERSIVE TOGGLE LOGIC
        const uiMaster = document.getElementById('ui-master');
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('galaxy-canvas');
        const navHeader = document.getElementById('nav-header');

        // Fade out when clicking empty space in the viewport or nav background
        viewport.addEventListener('click', (e) => {
            if (e.target === viewport) uiMaster.classList.add('ui-hidden');
        });
        navHeader.addEventListener('click', (e) => {
            if (e.target === navHeader) uiMaster.classList.add('ui-hidden');
        });

        // Fade in when clicking the galaxy canvas (which receives clicks when UI is hidden)
        canvas.addEventListener('click', () => {
            uiMaster.classList.remove('ui-hidden');
        });
    </script>

        // GENERATE SIDEBAR
        const sidebar = document.getElementById('sidebar');
        categories.forEach(cat => {
            sidebar.innerHTML += `<a class="menu-link" id="link-${cat.id}" onclick="showSection('${cat.id}')">${cat.name}</a>`;
        });

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            
            // Update active state in sidebar
            document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active-link'));
            const activeLink = document.getElementById(`link-${id}`);
            if(activeLink) activeLink.classList.add('active-link');

            const categoryName = categories.find(c => c.id === id)?.name || id;
            indicator.innerText = categoryName;
            
            grid.innerHTML = '';
            (linkData[id] || []).forEach(item => {
                grid.innerHTML += `
                <a href="${item.u}" target="_blank" class="hologram-card">
                    <div class="video-box">

            if(window.innerWidth < 1100 && sidebar.classList.contains('active')) {

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');

                indicator.innerText = "Global Search Override";

                });
            } else {

            }
