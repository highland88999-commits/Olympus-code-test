<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VORTEX | OLYMPUS MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 20px rgba(0,255,255,0.3);
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; color: #fff; }

        /* GALAXY ENGINE */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* UI MASTER WRAPPER (Toggled) */
        .ui-wrapper { opacity: 1; transition: var(--transition); pointer-events: all; }
        .ui-hidden { opacity: 0; pointer-events: none; }

        /* NAVIGATION & SEARCH */
        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 3000;
            width: 50px; height: 50px; background: rgba(0,0,0,0.7);
            border: 1.5px solid var(--neon-cyan); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan); font-size: 1.2rem; cursor: pointer;
            box-shadow: var(--glow); transition: 0.3s;
        }

        .search-wrap {
            position: fixed; top: 20px; left: 85px; right: 20px; z-index: 3000;
            max-width: 450px; /* Prevents run-off */
        }
        #mallSearch {
            width: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0,255,255,0.4); padding: 12px 20px;
            border-radius: 30px; color: #fff; outline: none; box-shadow: var(--glow);
            font-size: 0.9rem; box-sizing: border-box;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(25px);
            border-right: 1px solid var(--neon-cyan); z-index: 4000;
            transition: var(--transition); padding-top: 100px;
        }
        .sidebar.active { left: 0; }
        .menu-link {
            padding: 15px 30px; display: block; color: #888; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem;
            border-bottom: 1px solid rgba(188, 19, 254, 0.1); transition: 0.3s;
        }
        .menu-link:hover { color: var(--neon-cyan); background: rgba(0,255,255,0.05); padding-left: 40px; }

        /* MALL VIEWPORT */
        .viewport {
            position: fixed; inset: 0; z-index: 2; overflow-y: auto;
            padding: 120px 20px 100px; display: flex; flex-direction: column; align-items: center;
            scrollbar-width: none;
        }
        .viewport::-webkit-scrollbar { display: none; }

        .cat-title {
            color: var(--neon-cyan); letter-spacing: 10px; font-weight: 900;
            text-transform: uppercase; margin-bottom: 50px; text-shadow: var(--glow);
            text-align: center;
        }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; width: 100%; max-width: 1300px;
        }

        /* HOLO-CARD AESTHETIC */
        .hologram-card {
            background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,255,255,0.2); border-radius: 12px;
            text-decoration: none; overflow: hidden; transition: 0.4s;
            animation: float 5s ease-in-out infinite;
        }
        .hologram-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0,255,255,0.4);
        }
        .video-box { width: 100%; height: 120px; background: #000; overflow: hidden; }
        .masked-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .label {
            padding: 12px; color: #fff; font-size: 0.7rem; text-align: center;
            letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* OBSERVATION MODE TOAST */
        #obs-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,255,0.1); color: var(--neon-cyan);
            padding: 10px 20px; border-radius: 20px; font-size: 0.6rem;
            letter-spacing: 2px; z-index: 5000; pointer-events: none;
            opacity: 0.5; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="obs-toast">Click background to toggle Observation Mode</div>

    <canvas id="galaxy-canvas"></canvas>

    <div id="ui-container" class="ui-wrapper">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        
        <div class="search-wrap">
            <input type="text" id="mallSearch" placeholder="ACCESSING GLOBAL DATABASE..." onkeyup="searchMall()">
        </div>

        <nav class="sidebar" id="sidebar">
            <a class="menu-link" onclick="showSection('home')">Multiverse Core</a>
            <a class="menu-link" onclick="showSection('clothing')">Elite Apparel</a>
            <a class="menu-link" onclick="showSection('fintech')">Global Finance</a>
            <a class="menu-link" onclick="showSection('travel')">Travel & Space</a>
            <a class="menu-link" onclick="showSection('logistics')">Food & Logistics</a>
            <a class="menu-link" onclick="showSection('web')">Builders & Dev</a>
            <a class="menu-link" onclick="showSection('media')">Media & Stream</a>
        </nav>

        <div class="viewport">
            <div class="cat-title" id="cat-indicator">Olympus Core</div>
            <div class="icon-grid" id="mallGrid"></div>
        </div>
    </div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // STAR FIELD
        const starCount = 15000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 5000;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.2, transparent: true, opacity: 0.8});
        scene.add(new THREE.Points(starGeo, starMat));

        // NEBULA / PLANETS
        const createPlanet = (radius, dist, color, speed) => {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 32, 32), new THREE.MeshStandardMaterial({color: color, emissive: color, emissiveIntensity: 0.5}));
            const pivot = new THREE.Object3D();
            pivot.add(mesh);
            mesh.position.x = dist;
            scene.add(pivot);
            return { pivot, speed };
        };

        const objects = [
            createPlanet(15, 200, 0x00ffff, 0.005), // Cyan
            createPlanet(25, 450, 0xbc13fe, 0.002), // Purple
            createPlanet(10, 600, 0x3366dd, 0.008)  // Blue
        ];

        scene.add(new THREE.AmbientLight(0x222222));
        const pointLight = new THREE.PointLight(0x00ffff, 2, 2000);
        scene.add(pointLight);

        camera.position.z = 800;

        function animate() {
            requestAnimationFrame(animate);
            objects.forEach(o => o.pivot.rotation.y += o.speed);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // TOGGLE VISIBILITY ON BACKGROUND CLICK
        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'CANVAS') {
                document.getElementById('ui-container').classList.toggle('ui-hidden');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

                {n: "Spotify", u: "https://www.spotify.com"},
                {n: "Apple TV+", u: "https://tv.apple.com"}
            ]
        };

        const vidUrl = "https://files.catbox.moe/qnb2fw.mp4";

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            indicator.innerText = id.replace(/([A-Z])/g, ' $1').toUpperCase();
            grid.innerHTML = '';
            (linkData[id] || []).forEach(item => {
                grid.innerHTML += `
                <a href="${item.u}" target="_blank" class="hologram-card">
                    <div class="video-box">
                        <video class="masked-video" muted loop playsinline autoplay><source src="${vidUrl}" type="video/mp4"></video>
                    </div>
                    <div class="label">${item.n}</div>
                </a>`;
            });
            if(window.innerWidth < 1000) toggleSidebar();
        }

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            if(query.length > 0) {
                indicator.innerText = "Search Results";
                grid.innerHTML = '';
                Object.values(linkData).flat().forEach(item => {
                    if(item.n.toLowerCase().includes(query)) {
                        grid.innerHTML += `
                        <a href="${item.u}" target="_blank" class="hologram-card">
                            <div class="video-box"><video class="masked-video" muted loop playsinline autoplay><source src="${vidUrl}" type="video/mp4"></video></div>
                            <div class="label">${item.n}</div>
                        </a>`;
                    }
                });
            } else {
                showSection('home');
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        window.onload = () => showSection('home');
    </script>
</body>
</html>
