<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VORTEX | OLYMPUS HOLO-MALL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --glow: 0 0 25px rgba(0,255,255,0.4);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Segoe UI', sans-serif; }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* HEADER ELEMENTS - No longer inside a box */
        .menu-btn {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 3000;
            width: 50px; height: 50px;
            background: rgba(0,255,255,0.1);
            border: 1.5px solid #00ffff;
            color: #00ffff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            box-shadow: var(--glow);
            cursor: pointer;
        }

        .top-search {
            position: fixed;
            top: 20px; left: 85px; right: 20px;
            z-index: 3000;
        }
        #mallSearch {
            width: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0,255,255,0.5);
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            box-shadow: var(--glow);
        }

        /* SCROLLABLE CARD AREA - Floating in space */
        .estate-scroll-view {
            position: fixed;
            inset: 0;
            z-index: 2;
            padding: 100px 20px 100px;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .estate-scroll-view::-webkit-scrollbar { display: none; }

        /* RESIZED CARDS - Blue line adjustments */
        .estate-card {
            width: 90%;
            max-width: 340px; /* Slimmer profile */
            margin-bottom: 25px;
            border: 1.5px solid rgba(0,255,255,0.4);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            box-shadow: var(--glow);
            animation: cardFloat 5.8s ease-in-out infinite;
            transition: transform 0.3s;
        }
        .estate-card video {
            width: 100%;
            height: 140px; /* Reduced height based on sketch */
            object-fit: cover;
            opacity: 0.9;
        }
        .estate-card .title {
            padding: 12px;
            background: rgba(0,0,0,0.7);
            color: #00ffff;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes cardFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* FLOATING SHARE ORB */
        #floating-share {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 4000;
            width: 60px; height: 60px;
            background: rgba(0,255,255,0.1);
            border: 2px solid #00ffff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            color: #00ffff;
            box-shadow: var(--glow);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>

    <div class="top-search">
        <input type="text" id="mallSearch" placeholder="Initialize global search override...">
    </div>

    <div class="estate-scroll-view">
        <div class="estate-card">
            <video muted loop playsinline autoplay><source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4"></video>
            <div class="title">COLOSSUS XI</div>
        </div>
        <div class="estate-card">
            <video muted loop playsinline autoplay><source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4"></video>
            <div class="title">ZEUS VS HADES</div>
        </div>
        <div class="estate-card">
            <video muted loop playsinline autoplay><source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4"></video>
            <div class="title">MERLIN MANDATES</div>
        </div>
    </div>

    <div id="floating-share"><i class="fa-solid fa-share-nodes"></i></div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>

        // ... (Include your existing Three.js Solar System logic here)
        // Ensure the scene background is null or black to let the vacuum show.
    </script>
</body>
</html>
