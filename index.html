<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | MULTIVERSE MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 20px rgba(0,255,255,0.4);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; color: #fff; }

        /* GALAXY CANVAS */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* UI MASTER TOGGLE */
        .ui-master { opacity: 1; transition: var(--transition); pointer-events: all; z-index: 2; }
        .ui-hidden { opacity: 0; pointer-events: none; transform: scale(1.05); filter: blur(10px); }

        /* TOP NAVIGATION */
        .nav-header {
            position: fixed; top: 0; left: 0; right: 0; padding: 20px;
            display: flex; align-items: center; gap: 15px; z-index: 3000;
        }

        .menu-btn {
            width: 50px; height: 50px; background: rgba(0,0,0,0.8);
            border: 1.5px solid var(--neon-cyan); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan); font-size: 1.2rem; cursor: pointer; box-shadow: var(--glow);
        }

        .search-container { flex-grow: 1; max-width: 500px; }
        #mallSearch {
            width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border: 1.5px solid rgba(0,255,255,0.3); padding: 12px 25px;
            border-radius: 30px; color: #fff; outline: none; box-shadow: var(--glow);
            font-size: 0.9rem; box-sizing: border-box;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(30px);
            border-right: 1px solid var(--neon-cyan); z-index: 4000;
            transition: var(--transition); padding-top: 100px; overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .menu-link {
            padding: 18px 30px; display: block; color: #888; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem;
            border-bottom: 1px solid rgba(0,255,255,0.05); transition: 0.3s;
        }
        .menu-link:hover { color: var(--neon-cyan); background: rgba(0,255,255,0.05); padding-left: 40px; }

        /* MALL VIEWPORT */
        .viewport {
            position: fixed; inset: 0; overflow-y: auto;
            padding: 120px 20px 100px; display: flex; flex-direction: column; align-items: center;
            scrollbar-width: none; z-index: 2;
        }
        .viewport::-webkit-scrollbar { display: none; }

        .cat-banner {
            color: var(--neon-cyan); letter-spacing: 12px; font-weight: 900;
            text-transform: uppercase; margin-bottom: 60px; text-shadow: var(--glow);
            text-align: center; font-size: 1.4rem;
        }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px; width: 100%; max-width: 1400px;
        }

        /* HOLOGRAM CARDS */
        .hologram-card {
            background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,255,0.15); border-radius: 15px;
            text-decoration: none; overflow: hidden; transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .hologram-card:hover {
            transform: translateY(-10px); border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0,255,255,0.5);
        }
        .video-box { width: 100%; height: 130px; background: #000; position: relative; }
        .masked-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: hue-rotate(10deg); }
        .label {
            padding: 15px; color: #fff; font-size: 0.7rem; text-align: center;
            letter-spacing: 2px; text-transform: uppercase; font-weight: bold;
        }

        #obs-hint {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            color: rgba(0,255,255,0.4); font-size: 0.6rem; letter-spacing: 3px;
            text-transform: uppercase; pointer-events: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="obs-hint">Click background to de-rez interface</div>

    <canvas id="galaxy-canvas"></canvas>

    <div id="ui-master" class="ui-master">
        <header class="nav-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="INITIALIZING GLOBAL OVERRIDE..." onkeyup="searchMall()">
            </div>
        </header>

        <nav class="sidebar" id="sidebar">
            <a class="menu-link" onclick="showSection('core')">Multiverse Core</a>
            <a class="menu-link" onclick="showSection('tech')">The Tech Stack</a>
            <a class="menu-link" onclick="showSection('leisure')">Leisure & Canada</a>
            <a class="menu-link" onclick="showSection('food')">Global Food Ops</a>
            <a class="menu-link" onclick="showSection('travel')">Global Atlas</a>
            <a class="menu-link" onclick="showSection('apparel')">Elite Apparel</a>
            <a class="menu-link" onclick="showSection('finance')">Crypto & Fintech</a>
        </nav>

        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Olympus Core</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // STAR SYSTEM
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 20000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 1.5, transparent: true, opacity: 0.8 });
        scene.add(new THREE.Points(geometry, material));

        // CENTER VORTEX
        const sun = new THREE.Mesh(new THREE.SphereGeometry(40, 32, 32), new THREE.MeshStandardMaterial({color: 0xbc13fe, emissive: 0xbc13fe, emissiveIntensity: 2}));
        scene.add(sun);
        
        const light = new THREE.PointLight(0x00ffff, 3, 3000);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.z = 1000;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // OBS MODE TOGGLE
        window.addEventListener('click', (e) => {
            if(e.target.tagName === 'CANVAS') {
                document.getElementById('ui-master').classList.toggle('ui-hidden');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script>
        const linkData = {
            core: [

                {n: "Enter Elysium", u: "https://the-afterlife.vercel.app/"}
            ],
            tech: [
                {n: "Google Workspace", u: "https://workspace.google.com"},
                {n: "Microsoft 365", u: "https://www.office.com"},
                {n: "Apple iCloud", u: "https://www.icloud.com"},
                {n: "Azure Portal", u: "https://portal.azure.com"},
                {n: "Google Cloud", u: "https://console.cloud.google.com"},
                {n: "Apple Music", u: "https://music.apple.com"},

            ],

                {n: "Airbnb Luxe", u: "https://www.airbnb.com/luxe"},
                {n: "Lonely Planet", u: "https://www.lonelyplanet.com"},

            ],
            apparel: [
                {n: "Shein Official", u: "https://www.shein.com"},

                {n: "Lululemon", u: "https://shop.lululemon.com"},

            ],
            finance: [
                {n: "BlockDAG Network", u: "https://blockdag.network"},
                {n: "Binance Global", u: "https://www.binance.com"},
                {n: "Wealthsimple", u: "https://www.wealthsimple.com"},
                {n: "Coinbase Exchange", u: "https://www.coinbase.com"},
                {n: "Stripe Dashboard", u: "https://dashboard.stripe.com"}
            ]
        };

        const vidUrl = "https://files.catbox.moe/qnb2fw.mp4";

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            indicator.innerText = id.replace(/([A-Z])/g, ' $1').toUpperCase();
            grid.innerHTML = '';
            (linkData[id] || []).forEach(item => {
                grid.innerHTML += `
                <a href="${item.u}" target="_blank" class="hologram-card">
                    <div class="video-box">
                        <video class="masked-video" muted loop playsinline autoplay><source src="${vidUrl}" type="video/mp4"></video>
                    </div>
                    <div class="label">${item.n}</div>
                </a>`;
            });
            if(window.innerWidth < 1100) toggleSidebar();
        }

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            if(query.length > 0) {
                indicator.innerText = "Global Search Override";
                grid.innerHTML = '';
                Object.values(linkData).flat().forEach(item => {
                    if(item.n.toLowerCase().includes(query)) {
                        grid.innerHTML += `
                        <a href="${item.u}" target="_blank" class="hologram-card">
                            <div class="video-box"><video class="masked-video" muted loop playsinline autoplay><source src="${vidUrl}" type="video/mp4"></video></div>
                            <div class="label">${item.n}</div>
                        </a>`;
                    }
                });
            } else {
                showSection('core');
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        window.onload = () => showSection('core');
    </script>
</body>
</html>
