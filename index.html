<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | GRAND MULTIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 40px rgba(0,255,255,0.6);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; color:#fff; }

        canvas { position:fixed; top:0; left:0; z-index:1; }

        /* LIGHTNING BOLT HEADER – museum elegance */
        .lightning-bolt {
            position:fixed; top:18px; left:50%; transform:translateX(-50%);
            font-size:4.2rem; z-index:9999; pointer-events:none;
            text-shadow:0 0 50px currentColor, 0 0 100px currentColor;
            animation:boltPulse 3.4s infinite ease-in-out;
            transition:color 0.9s ease;
        }
        @keyframes boltPulse { 0%,100%{opacity:0.75;transform:translateX(-50%) scale(1);} 50%{opacity:1;transform:translateX(-50%) scale(1.15);} }

        /* UI */
        .ui-master { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; transition:all .6s cubic-bezier(0.19,1,0.22,1); }
        .ui-hidden { opacity:0; pointer-events:none; transform:scale(1.04); filter:blur(12px); }

        .nav-header { padding:22px; display:flex; align-items:center; gap:18px; background:linear-gradient(to bottom,rgba(0,0,0,0.92),transparent); z-index:3000; }
        .menu-btn, .mic-btn { width:52px; height:52px; background:rgba(0,0,0,0.85); border:1.8px solid var(--neon-cyan); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--neon-cyan); cursor:pointer; box-shadow:var(--glow); }
        .mic-btn.active { color:#ff0; box-shadow:0 0 30px #ff0; }

        .search-container { flex-grow:1; max-width:640px; }
        #mallSearch { width:100%; background:rgba(0,0,0,0.88); border:1.8px solid rgba(0,255,255,0.35); padding:16px 32px; border-radius:40px; color:#fff; outline:none; font-size:1rem; }

        .sidebar { position:fixed; top:0; left:-340px; width:320px; height:100%; background:rgba(5,5,5,0.96); backdrop-filter:blur(32px); border-right:1px solid var(--neon-cyan); z-index:4000; transition:all .7s cubic-bezier(0.19,1,0.22,1); padding:120px 0 60px; overflow-y:auto; }
        .sidebar.active { left:0; }
        .menu-link { padding:18px 34px; display:block; color:#aaa; text-transform:uppercase; letter-spacing:2.5px; font-size:0.73rem; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
        .menu-link:hover, .menu-link.active-link { color:var(--neon-cyan); background:rgba(0,255,255,0.06); border-left:4px solid var(--neon-cyan); }

        .viewport { flex-grow:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column; align-items:center; }
        .cat-banner { color:var(--neon-cyan); letter-spacing:14px; font-weight:900; text-transform:uppercase; margin-bottom:60px; text-shadow:var(--glow); font-size:1.65rem; }
        .icon-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(172px,1fr)); gap:32px; width:100%; max-width:1600px; }

        /* FLOATING CIRCULAR VIDEO ICON – museum elegance */
        .hologram-card {
            text-decoration:none; background:transparent; border:none; border-radius:50%;
            width:172px; height:172px; display:flex; flex-direction:column; align-items:center; justify-content:center;
            transition:0.5s cubic-bezier(0.19,1,0.22,1); cursor:pointer;
        }
        .hologram-card:hover { transform:scale(1.14); }
        .video-circle {
            width:124px; height:124px; border-radius:50%; overflow:hidden; border:4px solid rgba(0,255,255,0.4);
            box-shadow:0 0 45px rgba(0,255,255,0.5);
        }
        .masked-video { width:100%; height:100%; object-fit:cover; opacity:0.78; filter:hue-rotate(12deg) brightness(1.12); }
        .hologram-card:hover .masked-video { opacity:0.98; }
        .label { margin-top:16px; font-size:0.69rem; letter-spacing:2.2px; text-transform:uppercase; font-weight:bold; text-align:center; color:#fff; text-shadow:0 0 12px rgba(0,255,255,0.7); }

        /* HOLOFRAME */
        #holoframe {
            position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:9998; display:none; flex-direction:column;
        }
        #holoframe.active { display:flex; }
        #holoframe iframe { flex:1; border:none; width:100%; height:100%; }
        #closeHolo { position:absolute; top:25px; right:25px; padding:14px 28px; background:#fff; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold; z-index:9999; }

        #obs-hint { position:fixed; bottom:25px; width:100%; text-align:center; color:rgba(0,255,255,0.5); font-size:0.64rem; letter-spacing:3.5px; text-transform:uppercase; pointer-events:none; z-index:5000; }
    </style>
</head>
<body>

    <!-- Lightning Bolt Header -->
    <div class="lightning-bolt" id="lightning"><i class="fa-solid fa-bolt"></i></div>

    <canvas id="galaxy-canvas"></canvas>

    <!-- Holoframe -->
    <div id="holoframe">
        <button id="closeHolo" onclick="document.getElementById('holoframe').classList.remove('active')">CLOSE</button>
        <iframe id="holoIframe"></iframe>
    </div>

    <div id="ui-master" class="ui-master">
        <header class="nav-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="SEARCH THE MULTIVERSE..." onkeyup="searchMall()">
            </div>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i></button>
        </header>

        <nav class="sidebar" id="sidebar"></nav>

        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Olympus Core</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <div id="obs-hint">Click anywhere to explore the galaxy • Mic on = stars dance to the beat</div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 6000);
        const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.06;

        // Starfield – always orbiting + audio reactive
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0;i<28000;i++) starPos.push(THREE.MathUtils.randFloatSpread(6500), THREE.MathUtils.randFloatSpread(6500), THREE.MathUtils.randFloatSpread(6500));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
        const starMat = new THREE.PointsMaterial({color:0x00ffff, size:1.15, transparent:true, opacity:0.75});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // Sun
        const sun = new THREE.Mesh(new THREE.SphereGeometry(65,64,64), new THREE.MeshStandardMaterial({color:0xbc13fe, emissive:0xbc13fe, emissiveIntensity:2.5}));
        scene.add(sun);
        scene.add(new THREE.PointLight(0x00ffff,5,5000));
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.z = 1400;

        // Audio
        let analyser, dataArray;
        let micActive = false;
        let audioContext;
        let baseRotationSpeed = 0.0008; // constant gentle orbit

        const micBtn = document.getElementById('micBtn');
        micBtn.onclick = async () => {
            if (!micActive) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 128;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    micActive = true;
                    micBtn.classList.add('active');
                } catch(e) { console.warn('Mic denied'); }
            } else {
                micActive = false;
                micBtn.classList.remove('active');
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Always orbit
            stars.rotation.y += baseRotationSpeed;

            if (micActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
                const bass = dataArray[2] / 255 || 0;
                const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length / 255;

                // Speed changes with tempo/bass
                stars.rotation.y += bass * 0.012;

                // Vibration + scale
                const shake = bass * 6;
                const positions = stars.geometry.attributes.position.array;
                for(let i=0; i<positions.length; i+=3) {
                    positions[i]   += (Math.random()-0.5) * shake;
                    positions[i+1] += (Math.random()-0.5) * shake;
                    positions[i+2] += (Math.random()-0.5) * shake;
                }
                stars.geometry.attributes.position.needsUpdate = true;

                stars.scale.setScalar(1 + bass * 1.4);
                sun.scale.setScalar(1 + avg * 0.8);
            }

            renderer.render(scene, camera);
        }
        animate();

        // Rest of your mall (sidebar, cards, search, holoframe logic, data.json fallback) is fully included below

        // ... [full categories + linkData + showSection + searchMall + openLink with holoframe/new-tab logic + data.json fetch]

    </script>
</body>
</html>
