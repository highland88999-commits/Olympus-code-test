<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | MODULAR MULTIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 20px rgba(0,255,255,0.4);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; color: #fff; }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* UI MASTER */
        .ui-master { position: fixed; inset: 0; opacity: 1; transition: var(--transition); pointer-events: all; z-index: 2; display: flex; flex-direction: column; }
        .ui-hidden { opacity: 0; pointer-events: none; transform: scale(1.05); filter: blur(10px); }

        .nav-header { padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 3000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .menu-btn { width: 50px; height: 50px; flex-shrink: 0; background: rgba(0,0,0,0.8); border: 1.5px solid var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); cursor: pointer; box-shadow: var(--glow); }

        .search-container { flex-grow: 1; max-width: 600px; margin: 0 auto; }
        #mallSearch { width: 100%; background: rgba(0,0,0,0.8); border: 1.5px solid rgba(0,255,255,0.3); padding: 12px 25px; border-radius: 30px; color: #fff; outline: none; box-shadow: var(--glow); }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(30px); border-right: 1px solid var(--neon-cyan); z-index: 4000; transition: var(--transition); padding: 100px 0 50px 0; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .menu-link { padding: 16px 30px; display: block; color: #aaa; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; border-bottom: 1px solid rgba(0,255,255,0.05); cursor: pointer; }
        .menu-link:hover, .menu-link.active-link { color: var(--neon-cyan); background: rgba(0,255,255,0.05); border-left: 3px solid var(--neon-cyan); }

        /* GRID RENDERING */
        .viewport { flex-grow: 1; overflow-y: auto; padding: 20px 20px 100px; display: flex; flex-direction: column; align-items: center; scrollbar-width: none; }
        .cat-banner { color: var(--neon-cyan); letter-spacing: 12px; font-weight: 900; text-transform: uppercase; margin-bottom: 50px; text-shadow: var(--glow); text-align: center; font-size: 1.5rem; pointer-events: none; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; width: 100%; max-width: 1500px; pointer-events: none; }

        /* MODULAR HOLOGRAM CARDS */
        .hologram-card { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0,255,255,0.15); border-radius: 15px; text-decoration: none; overflow: hidden; transition: 0.4s; display: flex; flex-direction: column; pointer-events: auto; }
        .hologram-card:hover { transform: translateY(-8px); border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0,255,255,0.4); }
        
        .visual-container { width: 100%; height: 120px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .card-icon { font-size: 2.5rem; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; filter: contrast(1.2) brightness(0.8) sepia(1) hue-rotate(140deg); } /* THE BLACK BLOOM FILTER */

        .label { padding: 15px; color: #fff; font-size: 0.65rem; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <div id="ui-master" class="ui-master">
        <header class="nav-header" id="nav-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="ACCESSING DATABASE..." onkeyup="searchMall()">
            </div>
        </header>

        <nav class="sidebar" id="sidebar"></nav>

        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Initializing...</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<15000; i++) { starPos.push(THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000)); }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0x00ffff, size: 0.7});
        scene.add(new THREE.Points(starGeo, starMat));
        camera.position.z = 1000;
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        // OBSERVATION MODE LOGIC
        const ui = document.getElementById('ui-master');
        const vp = document.getElementById('viewport');
        const cv = document.getElementById('galaxy-canvas');
        vp.addEventListener('click', (e) => { if(e.target === vp) ui.classList.add('ui-hidden'); });
        cv.addEventListener('click', () => ui.classList.remove('ui-hidden'));
    </script>

    <script>
        let categories = [];
        let linkData = {};

        async function bootMultiverse() {
            try {
                const res = await fetch('database.json');
                const data = await res.json();
                categories = data.categories;
                linkData = data.links;
                
                const sidebar = document.getElementById('sidebar');
                categories.forEach(cat => {
                    sidebar.innerHTML += `<a class="menu-link" id="link-${cat.id}" onclick="showSection('${cat.id}')">${cat.name}</a>`;
                });
                showSection('core');
            } catch (e) {
                document.getElementById('cat-indicator').innerText = "DATA OFFLINE";
            }
        }

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const ind = document.getElementById('cat-indicator');
            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(`link-${id}`)?.classList.add('active-link');
            
            ind.innerText = categories.find(c => c.id === id)?.name || id;
            grid.innerHTML = '';
            
            (linkData[id] || []).forEach(item => {
                let visual = `<i class="${item.i || 'fa-solid fa-link'} card-icon"></i>`;
                if(item.img) visual = `<img src="${item.img}" class="card-img">`;
                
                grid.innerHTML += `
                    <a href="${item.u}" target="_blank" class="hologram-card">
                        <div class="visual-container">${visual}</div>
                        <div class="label">${item.n}</div>
                    </a>`;
            });
        }

        function searchMall() {
            const q = document.getElementById('mallSearch').value.toLowerCase();
            if(!q) { showSection('core'); return; }
            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';
            Object.values(linkData).flat().forEach(item => {
                if(item.n.toLowerCase().includes(q)) {
                    let v = item.img ? `<img src="${item.img}" class="card-img">` : `<i class="${item.i} card-icon"></i>`;
                    grid.innerHTML += `<a href="${item.u}" target="_blank" class="hologram-card"><div class="visual-container">${v}</div><div class="label">${item.n}</div></a>`;
                }
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        window.onload = bootMultiverse;
    </script>
</body>
</html>
