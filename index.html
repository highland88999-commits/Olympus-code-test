        .estate-card:nth-child(2) { animation-delay: 0.9s; }

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starVertices = [];
        for(let i=0;i<15000;i++) starVertices.push(THREE.MathUtils.randFloatSpread(5200), THREE.MathUtils.randFloatSpread(5200), THREE.MathUtils.randFloatSpread(5200));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
        const starMat = new THREE.PointsMaterial({size:1.7,color:0x88ffff,transparent:true,opacity:0.78});
        const stars = new THREE.Points(starGeo,starMat);
        scene.add(stars);

        // Planets (Sun removed)
        const planetSystems = [];
        const createPlanet = (r,d,c) => {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(r,48,48), new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.18}));
            scene.add(mesh);
            const sys = {mesh, orbitalDist:d, orbitalSpeed:0.0012, angle:Math.random()*Math.PI*2};
            planetSystems.push(sys);
            return mesh;
        };
        createPlanet(2.2,60,0xaaaaaa);
        createPlanet(3.8,90,0xffcc66);
        createPlanet(4.0,130,0x3388ff);
        createPlanet(3.0,180,0xff5533);
        createPlanet(10,300,0xffbb77);
        createPlanet(8.5,450,0xffeebb);
        createPlanet(6,650,0xaaffff);
        createPlanet(6,800,0x3366dd);

        camera.position.set(0,190,680);
        controls.update();

        // BLACK HOLE / BIG BANG VORTEX EVERY 5 MINUTES
        let vortexTimeout = setInterval(() => {
            triggerVortex();
        }, 300000); // exactly 5 minutes

        function triggerVortex() {
            const originalPositions = planetSystems.map(s => s.mesh.position.clone());
            // Vacuum pull to center (2 seconds)
            let pullTime = 0;
            const pullInterval = setInterval(() => {
                pullTime += 16;
                const progress = Math.min(pullTime / 2000, 1);
                planetSystems.forEach((s,i) => {
                    s.mesh.position.lerp(new THREE.Vector3(0,0,0), progress * 0.92);
                    s.mesh.scale.setScalar(1 - progress * 0.7);
                });
                if (progress >= 1) {
                    clearInterval(pullInterval);
                    // Big Bang snap back
                    setTimeout(() => {
                        planetSystems.forEach((s,i) => {
                            s.mesh.position.copy(originalPositions[i]);
                            s.mesh.scale.setScalar(1);
                            s.angle = Math.random() * Math.PI * 2; // chaotic reposition
                        });
                    }, 400);
                }
            }, 16);
        }

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.00014;
            planetSystems.forEach(s => {
                s.angle += s.orbitalSpeed;
                s.mesh.position.x = Math.cos(s.angle) * s.orbitalDist;
                s.mesh.position.z = Math.sin(s.angle) * s.orbitalDist;
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

            food: [{n:"Uber Eats",u:"https://www.ubereats.com",m:"mask-food"},{n:"DoorDash",u:"https://www.doordash.com",m:"mask-food"},{n:"HelloFresh",u:"https://www.hellofresh.com",m:"mask-food"},{n:"Instacart",u:"https://www.instacart.com",m:"mask-food"},{n:"Grubhub",u:"https://www.grubhub.com",m:"mask-food"},{n:"SkipTheDishes",u:"https://www.skipthedishes.com",m:"mask-food"},{n:"Postmates",u:"https://www.postmates.com",m:"mask-food"},{n:"Seamless",u:"https://www.seamless.com",m:"mask-food"}],

        };

        let currentCategory = 'home';
        let cardsVisible = true;

        function buildCard(item) {
            return `<a href="${item.u}" target="_blank" class="hologram-card"><div class="video-mask \( {item.m}"><video class="masked-video" muted loop playsinline autoplay><source src="https://files.catbox.moe/qnb2fw.mp4" type="video/mp4"></video></div><div class="label"> \){item.n}</div></a>`;
        }

        function showSection(id) {
            currentCategory = id;
            // ... (dynamic grid logic same as before)
        }

        function searchMall() { /* full search logic same as before */ }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function toggleCards() {
            cardsVisible = !cardsVisible;
            const cards = document.querySelectorAll('.estate-card');
            cards.forEach(c => c.style.opacity = cardsVisible ? '1' : '0.08');
            cards.forEach(c => c.style.pointerEvents = cardsVisible ? 'auto' : 'none');
        }

        function toggleSharePanel() {
            document.getElementById('share-panel').classList.toggle('active');
        }

        function shareTo(platform) {
            const url = encodeURIComponent(location.href);
            const text = encodeURIComponent("OLYMPUS HOLO-MALL inside Nexus Vortex");
            let link = '';
            switch(platform){
                case 'x': link = `https://twitter.com/intent/tweet?text=\( {text}&url= \){url}`; break;
                // ... (all other platforms same as before)
            }
            if(link) window.open(link,'_blank');
        }

        // Click anywhere on holo (except cards) fades cards
        document.getElementById('olympus-holo').addEventListener('click', (e) => {
            if (!e.target.closest('.estate-card') && !e.target.closest('.menu-btn') && !e.target.closest('#floating-share')) {
                toggleCards();
            }
        });

        // Auto-start
        window.onload = () => {
            document.getElementById('olympus-holo').classList.add('active');
            // cards start visible
        };
    </script>
</body>
