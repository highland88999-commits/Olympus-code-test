<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VORTEX | OLYMPUS HOLO-MALL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --black-bloom: #050505;
            --glow: 0 0 25px rgba(0,255,255,0.4);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background: var(--black-bloom); font-family: 'Segoe UI', sans-serif; }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; display:block; touch-action:none; }

        /* FLOATING INTERFACE ELEMENTS */
        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 3000;
            width: 54px; height: 54px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border: 1.5px solid var(--neon-cyan); color: var(--neon-cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; box-shadow: var(--glow); cursor: pointer;
            transition: 0.3s;
        }
        .menu-btn:hover { background: var(--neon-cyan); color: #000; }

        .top-search {
            position: fixed; top: 25px; left: 95px; right: 25px; z-index: 3000;
            max-width: 500px;
        }
        #mallSearch {
            width: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            border: 1.5px solid rgba(0,255,255,0.4); padding: 14px 22px;
            border-radius: 12px; color: #fff; outline: none; box-shadow: var(--glow);
            letter-spacing: 1px;
        }

        /* SIDEBAR OVERLAY */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,255,255,0.2); z-index: 4000;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 100px 20px;
        }
        .sidebar.active { left: 0; }
        .menu-link {
            display: block; color: #aaa; text-decoration: none; padding: 15px;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px solid rgba(0,255,255,0.1); cursor: pointer;
        }
        .menu-link:hover { color: var(--neon-cyan); background: rgba(0,255,255,0.05); }

        /* THE FLOATING GRID (No Container) */
        .viewport {
            position: fixed; inset: 0; z-index: 2;
            overflow-y: auto; scrollbar-width: none;
            padding: 120px 20px 100px;
            display: flex; flex-direction: column; align-items: center;
        }
        .viewport::-webkit-scrollbar { display: none; }

        .cat-label {
            color: var(--neon-cyan); letter-spacing: 8px; font-weight: bold;
            text-transform: uppercase; margin-bottom: 40px; text-shadow: var(--glow);
        }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px;
        }

        /* RESIZED COMPACT CARDS */
        .hologram-card {
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
            border: 1.5px solid rgba(0,255,255,0.3); border-radius: 15px;
            padding: 0; text-decoration: none; position: relative;
            overflow: hidden; transition: 0.4s; box-shadow: var(--glow);
            animation: floatSway 6s ease-in-out infinite;
        }
        .hologram-card:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0,255,255,0.6);
        }
        .video-mask {
            width: 100%; height: 140px; position: relative;
            background: #000; overflow: hidden;
        }
        .masked-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .label {
            padding: 15px; color: #fff; font-size: 0.75rem;
            text-align: center; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        @keyframes floatSway {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg); }
        }

        /* SHARE ORB */
        #floating-share {
            position: fixed; bottom: 30px; right: 30px; z-index: 5000;
            width: 64px; height: 64px; background: rgba(0,0,0,0.6);
            border: 2px solid var(--neon-cyan); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan); font-size: 1.6rem; cursor: pointer;
            box-shadow: var(--glow);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

    <div class="top-search">
        <input type="text" id="mallSearch" placeholder="INITIALIZE SEARCH OVERRIDE..." onkeyup="searchMall()">
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="menu-link" onclick="showSection('home')">Home / Core</div>
        <div class="menu-link" onclick="showSection('food')">Logistics / Food</div>
        <div class="menu-link" onclick="showSection('fintech')">Fintech / Crypto</div>
        <div class="menu-link" onclick="showSection('entertainment')">Entertainment</div>
        <div class="menu-link" onclick="showSection('travel')">Deep Space Travel</div>
    </nav>

    <div class="viewport">
        <div class="cat-label" id="cat-indicator">Olympus Mall</div>
        <div class="icon-grid" id="mallGrid">
            </div>
    </div>

    <div id="floating-share" onclick="nativeShare()"><i class="fa-solid fa-share-nodes"></i></div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Space Dust
        const starGeo = new THREE.BufferGeometry();
        const starVertices = [];
        for(let i=0; i<10000; i++) starVertices.push(THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x00ffff, size: 1.5, transparent: true, opacity: 0.6}));
        scene.add(stars);

        // Orbital Engine
        const planets = [];
        const addPlanet = (r, d, c) => {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), new THREE.MeshStandardMaterial({color: c, emissive: c, emissiveIntensity: 0.2}));
            const orbit = { mesh, dist: d, speed: Math.random() * 0.002, angle: Math.random() * Math.PI * 2 };
            planets.push(orbit);
            scene.add(mesh);
        };

        addPlanet(5, 100, 0x00ffff); // Cyan Core
        addPlanet(8, 200, 0xbc13fe); // Purple Giant
        addPlanet(12, 350, 0x3366dd); // Royal Blue

        scene.add(new THREE.AmbientLight(0x404040));
        const pointLight = new THREE.PointLight(0x00ffff, 2, 1000);
        scene.add(pointLight);

        camera.position.z = 600;

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0002;
            planets.forEach(p => {
                p.angle += p.speed;
                p.mesh.position.set(Math.cos(p.angle)*p.dist, 0, Math.sin(p.angle)*p.dist);
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script>
        const linkData = {
            home: [
                {n: "Olympus Core", u: "https://nexusvortex.ca", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "Artemis OS", u: "https://artemis-os.vercel.app/", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "Colossus XI", u: "https://colossus-xi.vercel.app/", v: "https://files.catbox.moe/qnb2fw.mp4"}
            ],
            food: [
                {n: "Instacart", u: "https://www.instacart.com", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "Uber Eats", u: "https://www.ubereats.com", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "HelloFresh", u: "https://www.hellofresh.com", v: "https://files.catbox.moe/qnb2fw.mp4"}
            ],
            fintech: [
                {n: "BlockDAG", u: "https://blockdag.network", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "Wealthsimple", u: "https://www.wealthsimple.com", v: "https://files.catbox.moe/qnb2fw.mp4"},
                {n: "Binance", u: "https://www.binance.com", v: "https://files.catbox.moe/qnb2fw.mp4"}
            ]
        };

        function buildCard(item) {
            return `
            <a href="${item.u}" target="_blank" class="hologram-card">
                <div class="video-mask">
                    <video class="masked-video" muted loop playsinline autoplay><source src="${item.v}" type="video/mp4"></video>
                </div>
                <div class="label">${item.n}</div>
            </a>`;
        }

        function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            indicator.innerText = id.toUpperCase();
            grid.innerHTML = '';
            (linkData[id] || []).forEach(item => grid.innerHTML += buildCard(item));
            toggleSidebar();
        }

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';
            Object.values(linkData).flat().forEach(item => {
                if(item.n.toLowerCase().includes(query)) grid.innerHTML += buildCard(item);
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        
        function nativeShare() {
            if(navigator.share) navigator.share({title: 'Olympus Mall', url: window.location.href});
        }

        window.onload = () => showSection('home');
    </script>
</body>
</html>
