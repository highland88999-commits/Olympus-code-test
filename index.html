<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPUS | NEXUS VORTEX CORE ✨🩸❤️⚡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --royal-blue: #002366;
            --vibrant-orange: #ff4500;
            --blood-red: #c8102e;
            --heart-pink: #ff69b4;
            --active-accent: var(--neon-cyan);
            --black-bloom: rgba(0,0,0,0.9);
            --transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:#fff; }
        
        canvas { position:fixed; top:0; left:0; z-index:1; cursor: grab; }
        canvas:active { cursor: grabbing; }

        #void-trigger { position: fixed; inset: 0; z-index: 5; pointer-events: auto; background: transparent; display: none; }

        .ui-wrapper { position: fixed; inset: 0; z-index: 10; pointer-events: none; transition: var(--transition); opacity: 1; }
        .ui-wrapper.hidden { opacity: 0; filter: blur(20px); transform: scale(1.1); pointer-events: none; }
        .ui-wrapper > * { pointer-events: auto; }

        .lightning-bolt {
            position:absolute; top:85px; left:50%; transform:translateX(-50%);
            font-size:3.8rem; color: var(--active-accent);
            text-shadow: 0 0 20px var(--active-accent), 0 0 50px var(--active-accent), 0 0 80px var(--heart-pink);
            animation: boltPulse 2.5s infinite alternate;
            pointer-events: none; z-index: 11;
        }
        @keyframes boltPulse { from { opacity: 0.5; transform: translateX(-50%) scale(0.9); } to { opacity: 1; transform: translateX(-50%) scale(1.15); } }

        .nav-header { padding:22px; display:flex; align-items:center; gap:18px; background:linear-gradient(to bottom, rgba(0,0,0,0.85), transparent); }
        .menu-btn, .mic-btn { 
            width:54px; height:54px; background:rgba(0,0,0,0.9); 
            border:2.5px solid var(--active-accent); border-radius:50%; 
            display:flex; align-items:center; justify-content:center; 
            color:var(--active-accent); cursor:pointer; 
            box-shadow: 0 0 15px var(--active-accent); transition: 0.4s;
        }
        .mic-btn.active { color:#ffff00 !important; border-color:#ffff00 !important; box-shadow: 0 0 30px #ffff00 !important; }

        .search-container { flex-grow:1; max-width:480px; margin: 0 auto; }
        #mallSearch { 
            width:100%; background:rgba(0,0,0,0.8); border:1.5px solid var(--active-accent); 
            padding:14px 25px; border-radius:40px; color:#fff; text-align: center; outline:none;
            letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;
            box-shadow: inset 0 0 10px rgba(0,255,255,0.1);
        }

        .sidebar { 
            position:fixed; top:0; left:-340px; width:300px; height:100%; 
            background:var(--black-bloom); backdrop-filter:blur(50px); 
            border-right:1px solid var(--active-accent); z-index:4000; 
            transition: var(--transition); padding:100px 0; overflow-y:auto; 
        }
        .sidebar.active { left:0; box-shadow: 30px 0 100px rgba(0,0,0,0.9); }
        .menu-link { 
            padding:20px 40px; display:block; color:rgba(255,255,255,0.4); 
            text-transform:uppercase; letter-spacing:4px; font-size:0.75rem; 
            text-decoration: none; cursor:pointer; transition: 0.3s;
        }
        .menu-link:hover, .menu-link.active-link { color:var(--active-accent); background: rgba(0,255,255,0.05); border-left: 4px solid var(--active-accent); }

        .viewport { position: relative; height: 100vh; overflow-y: auto; padding: 180px 20px 100px; display: flex; flex-direction: column; align-items: center; scrollbar-width: none; }
        .cat-banner { color:var(--active-accent); letter-spacing:15px; font-weight:900; text-transform:uppercase; margin-bottom:70px; text-shadow: 0 0 30px var(--active-accent); font-size:1.6rem; text-align: center; }
        .icon-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:50px; width:100%; max-width:1200px; }

        .hologram-card { 
            text-decoration:none; display:flex; flex-direction:column; align-items:center; transition: 0.4s; cursor:pointer;
        }
        .hologram-card:hover { transform: translateY(-15px) scale(1.05); }
        .video-circle {
            width:125px; height:125px; border-radius:50%; overflow:hidden; 
            border:2px solid var(--active-accent); box-shadow:0 0 30px var(--active-accent);
            position: relative; background: #000;
        }
        .card-video { width:100%; height:100%; object-fit:cover; opacity:0.7; position: absolute; z-index:1; }
        .card-icon { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--active-accent); z-index:2; text-shadow: 0 0 10px #000; }
        .label { margin-top:20px; font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; font-weight:bold; text-align:center; color:#fff; text-shadow: 0 0 5px #000; }

        /* HOLOFRAME OVERLAY (from GitHub past + upgraded) */
        #holoframe {
            position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:9998; display:none; flex-direction:column;
        }
        #holoframe.active { display:flex; }
        #holoframe iframe { flex:1; border:none; width:100%; height:100%; }
        #closeHolo { 
            position:absolute; top:25px; right:25px; padding:14px 28px; 
            background:var(--active-accent); color:#000; border:none; border-radius:10px; 
            cursor:pointer; font-weight:bold; z-index:9999; box-shadow:0 0 30px var(--active-accent);
        }

        #obs-hint { 
            position:fixed; bottom:25px; width:100%; text-align:center; 
            color:rgba(255,255,255,0.35); font-size:0.64rem; letter-spacing:3.5px; 
            text-transform:uppercase; pointer-events:none; z-index:5000;
        }

        /* GLITCH + BLOOD TINT */
        #glitch-screen { position: fixed; inset: 0; z-index: 9999; pointer-events: none; background: rgba(0,255,255,0.05); display: none; }
        #glitch-screen.active-blood { background: rgba(200,16,46,0.12); animation: bloodGlitch 0.3s infinite; }
        @keyframes bloodGlitch { 0%,100% { opacity:0.12; } 50% { opacity:0.25; } }
    </style>
</head>
<body>

    <div id="glitch-screen"></div>
    <canvas id="galaxy-canvas"></canvas>
    <div id="void-trigger"></div>

    <!-- HOLOFRAME -->
    <div id="holoframe">
        <button id="closeHolo" onclick="document.getElementById('holoframe').classList.remove('active')">✕ CLOSE NEXUS</button>
        <iframe id="holoIframe"></iframe>
    </div>

    <div id="obs-hint">OBSERVING THE VORTEX CORE • MIC • GLITCH • DEVOURER CYCLE ACTIVE ✨🩸❤️⚡</div>

    <div id="ui-wrapper" class="ui-wrapper">
        <div class="lightning-bolt" id="lightning"><i class="fa-solid fa-bolt"></i></div>
        <header class="nav-header">
            <button class="menu-btn" id="burger"><i class="fa-solid fa-bars"></i></button>
            <div class="search-container">
                <input type="text" id="mallSearch" placeholder="ACCESSING OLYMPUS..." onkeyup="searchMall()">
            </div>
            <button class="mic-btn" id="micBtn"><i class="fa-solid fa-microphone"></i></button>
        </header>
        <nav class="sidebar" id="sidebar"></nav>
        <main class="viewport" id="viewport">
            <div class="cat-banner" id="cat-indicator">Initializing Sync...</div>
            <div class="icon-grid" id="mallGrid"></div>
        </main>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 20000);
        const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 0.4;

        let isCollapsing = false;
        const starCount = 30000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const homePos = new Float32Array(starCount * 3);
        
        for(let i=0; i < starCount * 3; i++) {
            const p = THREE.MathUtils.randFloatSpread(10000);
            starPos[i] = p; homePos[i] = p;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color:0x00ffff, size:2.4, transparent:true, opacity:0.8, blending: THREE.AdditiveBlending});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        const sun = new THREE.Mesh(new THREE.SphereGeometry(110,64,64), new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff, emissiveIntensity:6}));
        scene.add(sun);
        const light = new THREE.PointLight(0x00ffff, 25, 12000);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.set(0, 400, 2800);

        let audioCtx, analyser, dataArray, micActive = false;
        document.getElementById('micBtn').onclick = async (e) => {
            e.stopPropagation();
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(!micActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    const source = audioCtx.createMediaStreamSource(stream);
                    analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    micActive = true; 
                    document.getElementById('micBtn').classList.add('active');
                } catch(err) { console.error("Mic denied"); }
            } else {
                micActive = false; 
                document.getElementById('micBtn').classList.remove('active');
            }
        };

        const ui = document.getElementById('ui-wrapper');
        const voidShield = document.getElementById('void-trigger');

        controls.addEventListener('start', () => {
            ui.classList.add('hidden');
            voidShield.style.display = 'block';
        });

        voidShield.onclick = () => {
            ui.classList.remove('hidden');
            voidShield.style.display = 'none';
        };

        window.updateGalaxy = (hex) => {
            const c = new THREE.Color(hex);
            sun.material.color.set(c); sun.material.emissive.set(c);
            stars.material.color.set(c); light.color.set(c);
            document.documentElement.style.setProperty('--active-accent', hex);
        };

        // DEVOURER CYCLE WITH BLOOD + HEART
        setInterval(() => {
            isCollapsing = true;
            const glitch = document.getElementById('glitch-screen');
            glitch.style.display = 'block';
            glitch.classList.add('active-blood');
            setTimeout(() => {
                isCollapsing = false;
                glitch.style.display = 'none';
                glitch.classList.remove('active-blood');
                const cycleColors = ['#00ffff', '#002366', '#ff4500', '#bc13fe', '#00ff66', '#c8102e', '#ff69b4'];
                window.updateGalaxy(cycleColors[Math.floor(Math.random()*cycleColors.length)]);
            }, 8000);
        }, 180000);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const posAttr = stars.geometry.attributes.position;

            if (isCollapsing) {
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    posAttr.array[idx] *= 0.94;
                    posAttr.array[idx+1] *= 0.94;
                    posAttr.array[idx+2] *= 0.94;
                }
                sun.scale.multiplyScalar(1.08);
                if(sun.scale.x > 20) sun.scale.set(0.01, 0.01, 0.01);
            } else {
                let intensity = 0;
                if(micActive && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    intensity = dataArray[8] / 255;
                }
                for(let i=0; i<starCount; i++){
                    const idx = i*3;
                    const vibe = (Math.sin(Date.now() * 0.3 + i) * (intensity * 100));
                    posAttr.array[idx] = THREE.MathUtils.lerp(posAttr.array[idx], homePos[idx] + vibe, 0.1);
                }
                sun.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
            }
            posAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>

    <script>
        const REPO_JSON = "https://raw.githubusercontent.com/highland88999-commits/Olympus-code-test/main/data.json";
        const HOLO_VIDEO = "https://files.catbox.moe/qnb2fw.mp4";
        let masterData = { categories: [], links: {} };

        async function syncOlympus() {
            try {
                const res = await fetch(`\( {REPO_JSON}?t= \){Date.now()}`);
                if(!res.ok) throw new Error("Sync Failed");
                const data = await res.json();
                masterData = data;
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = ''; 

                data.categories.forEach(cat => {
                    const btn = document.createElement('div');
                    btn.className = 'menu-link';
                    btn.id = `nav-${cat.id}`;
                    btn.innerText = cat.name;
                    btn.onclick = () => { switchView(cat.id); toggleMenu(false); };
                    sidebar.appendChild(btn);
                });
                
                if (data.categories.length > 0) switchView(data.categories[0].id);
            } catch (err) {
                document.getElementById('cat-indicator').innerText = "DATA OFFLINE: RE-SYNC REQUIRED";
                console.error("Olympus Error:", err);
            }
        }

        function openHolo(url) {
            document.getElementById('holoIframe').src = url;
            document.getElementById('holoframe').classList.add('active');
        }

        function switchView(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            const themeColors = { core: '#00ffff', featured: '#bc13fe', finance: '#FFD700', tech: '#00ff66' };
            
            if(window.updateGalaxy) window.updateGalaxy(themeColors[id] || '#00ffff');

            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(`nav-${id}`)?.classList.add('active-link');
            
            const category = masterData.categories.find(c => c.id === id);
            indicator.innerText = category ? category.name : id;
            
            grid.innerHTML = '';
            const items = masterData.links[id] || [];
            
            items.forEach(item => {
                grid.innerHTML += `
                    <div onclick="openHolo('${item.u}')" class="hologram-card">
                        <div class="video-circle">
                            <video src="${HOLO_VIDEO}" autoplay loop muted playsinline class="card-video"></video>
                            <div class="card-icon"><i class="${item.i || 'fa-solid fa-cube'}"></i></div>
                        </div>
                        <div class="label">${item.n}</div>
                    </div>`;
            });
        }

        const sb = document.getElementById('sidebar');
        const burger = document.getElementById('burger');
        function toggleMenu(s) { if(s === false) sb.classList.remove('active'); else sb.classList.toggle('active'); }
        burger.onclick = (e) => { e.stopPropagation(); toggleMenu(); };
        window.onclick = (e) => { if(!sb.contains(e.target) && !burger.contains(e.target)) toggleMenu(false); };

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            if(!query) { switchView(masterData.categories[0].id); return; }
            const grid = document.getElementById('mallGrid');
            grid.innerHTML = '';
            Object.values(masterData.links).flat().forEach(item => {
                if(item.n.toLowerCase().includes(query)) {
                    grid.innerHTML += `
                        <div onclick="openHolo('${item.u}')" class="hologram-card">
                            <div class="video-circle">
                                <video src="${HOLO_VIDEO}" autoplay loop muted playsinline class="card-video"></video>
                                <div class="card-icon"><i class="${item.i || 'fa-solid fa-link'}"></i></div>
                            </div>
                            <div class="label">${item.n}</div>
                        </div>`;
                }
            });
        }

        syncOlympus();
    </script>
</body>
</html>
